<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarDiary by Grafittiii</title>
    <!-- 預加載主要字體 -->
    <link rel="preload" href="https://cdn.jsdelivr.net/gh/max32002/pop-gothic@2.143/webfont/CJK%20TC/PopGothicCjkTc-Regular.woff2" as="font" type="font/woff2" crossorigin>

    <link rel="preload" href="https://cdn.jsdelivr.net/gh/max32002/JasonHandWritingFonts@20240409/webfont/JasonHandwriting3-Regular.woff2" as="font" type="font/woff2" crossorigin>

    <link rel="preload" href="https://cdn.jsdelivr.net/gh/max32002/naikaifont@1.89/webfont/NaikaiFont-Regular.woff2" as="font" type="font/woff2" crossorigin>

    <style>
        /* 大波浪圓體 - 可愛圓潤 */
        @font-face {
            font-family: 'PopGothic';
            src: url('https://cdn.jsdelivr.net/gh/max32002/pop-gothic@2.143/webfont/CJK%20TC/PopGothicCjkTc-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'PopGothic';
            src: url('https://cdn.jsdelivr.net/gh/max32002/pop-gothic@2.143/webfont/CJK%20TC/PopGothicCjkTc-Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }
        /* 清松手寫體1 - 圓潤手寫 */
        @font-face {
            font-family: 'JasonHandwriting1';
            src: url('https://cdn.jsdelivr.net/gh/max32002/JasonHandWritingFonts@20240409/webfont/JasonHandwriting1-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }
        /* 清松手寫體3 - 呆萌手寫 */
        @font-face {
            font-family: 'JasonHandwriting3';
            src: url('https://cdn.jsdelivr.net/gh/max32002/JasonHandWritingFonts@20240409/webfont/JasonHandwriting3-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }
        /* 粉圓體 (YuPearl 衍生自 open-huninn) - 可愛圓潤 */
        @font-face {
            font-family: 'Huninn';
            src: url('https://cdn.jsdelivr.net/gh/max32002/YuPearl@1.011/webfont/YuPearl-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }
        /* 內海字體 - 可愛手寫 */
        @font-face {
            font-family: 'NaikaiFont';
            src: url('https://cdn.jsdelivr.net/gh/max32002/naikaifont@1.89/webfont/NaikaiFont-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }
        /* 獅尾四季春 - 現代宋體 */
        @font-face {
            font-family: 'SweiSpring';
            src: url('https://cdn.jsdelivr.net/gh/max32002/swei-spring@1.068/WebFont/CJK%20TC/SweiSpringCJKtc-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

    <style>
        :root {
            --primary-font: 'LXGW WenKai TC', 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            --glass: rgba(255, 255, 255, 0.8);
            --accent-color: #ff748c;
            --accent-text: #fff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* 禁止複製非用戶輸入的文字 */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* 允許用戶輸入區域選取和複製 */
        #answer-editor,
        input[type="text"],
        input[type="number"],
        textarea {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        /* ===== Brand Splash Screen ===== */
        #brand-splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg,
                #ff9a9e, #fecfef, #fad0c4, #ffecd2,
                #a1c4fd, #c2e9fb, #d4fc79, #96e6a1,
                #ff9a9e);
            background-size: 400% 400%;
            animation: splashGradient 4s ease infinite;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                        visibility 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #brand-splash.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        @keyframes splashGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Logo Container - shifted up so logo is centered */
        .splash-logo-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transform: translateY(-8vh);
        }

        /* Star Icon Animation */
        .splash-star {
            font-size: 48px;
            color: #ff748c;
            animation: starPulse 1.5s ease-in-out infinite, starFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 20px rgba(255, 116, 140, 0.5));
        }
        @keyframes starPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.9; }
        }
        @keyframes starFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            25% { transform: translateY(-8px) scale(1.05); }
            75% { transform: translateY(4px) scale(0.98); }
        }

        /* Main Logo Text with White Glow */
        .splash-logo {
            font-family: 'LXGW WenKai TC', Georgia, 'Times New Roman', serif;
            font-size: clamp(42px, 12vw, 72px);
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg,
                #ff748c 0%,
                #ff9a9e 25%,
                #ffb6c1 50%,
                #ff9a9e 75%,
                #ff748c 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            /* 預設隱藏，等字體載入後才顯示 */
            opacity: 0;
            transform: translateY(20px);
            /* 動畫暫停，等待 font-ready class */
        }
        /* 字體載入完成後才啟動動畫 */
        .splash-logo.font-ready {
            animation: logoGradient 3s ease infinite, logoAppear 1s ease-out forwards, logoAuraPulse 2.5s ease-in-out infinite;
        }
        @keyframes logoAuraPulse {
            0%, 100% {
                filter:
                    drop-shadow(0 0 6px rgba(255, 255, 255, 0.95))
                    drop-shadow(0 0 15px rgba(255, 255, 255, 0.8))
                    drop-shadow(0 0 35px rgba(255, 255, 255, 0.5));
            }
            50% {
                filter:
                    drop-shadow(0 0 10px rgba(255, 255, 255, 1))
                    drop-shadow(0 0 25px rgba(255, 255, 255, 0.9))
                    drop-shadow(0 0 50px rgba(255, 255, 255, 0.6));
            }
        }
        @keyframes logoGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes logoAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Subtitle */
        .splash-subtitle {
            font-family: 'LXGW WenKai TC', Georgia, serif;
            font-size: clamp(12px, 3.5vw, 16px);
            color: rgba(80, 60, 70, 0.8);
            letter-spacing: 6px;
            text-transform: uppercase;
            /* 預設隱藏，等字體載入後才顯示 */
            opacity: 0;
        }
        /* 字體載入完成後才啟動動畫 */
        .splash-subtitle.font-ready {
            animation: subtitleAppear 0.8s ease-out 0.4s forwards;
        }
        @keyframes subtitleAppear {
            to { opacity: 0.7; }
        }

        /* Loading Indicator */
        .splash-loading {
            position: absolute;
            bottom: -60px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            animation: loadingAppear 0.6s ease-out 0.8s forwards;
        }
        @keyframes loadingAppear {
            to { opacity: 1; }
        }

        .splash-loading-dots {
            display: flex;
            gap: 6px;
        }
        .splash-loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 116, 140, 0.6);
            animation: dotBounce 1.2s ease-in-out infinite;
        }
        .splash-loading-dot:nth-child(2) { animation-delay: 0.15s; }
        .splash-loading-dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-10px); opacity: 1; }
        }

        .splash-loading-text {
            font-family: 'LXGW WenKai TC', sans-serif;
            font-size: 13px;
            color: rgba(80, 60, 70, 0.6);
            margin-left: 4px;
        }

        /* Decorative floating stars */
        .splash-star-deco {
            position: absolute;
            font-size: 20px;
            opacity: 0.5;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 10px rgba(255, 220, 255, 0.8), 0 0 20px rgba(255, 180, 220, 0.5);
            animation: starDecoFloat 6s ease-in-out infinite, starDecoTwinkle 2s ease-in-out infinite;
            pointer-events: none;
        }
        .splash-star-deco:nth-child(1) { top: 12%; left: 8%; animation-delay: 0s; font-size: 22px; }
        .splash-star-deco:nth-child(2) { top: 20%; right: 12%; animation-delay: 0.8s; font-size: 16px; }
        .splash-star-deco:nth-child(3) { bottom: 35%; left: 6%; animation-delay: 1.6s; font-size: 28px; }
        .splash-star-deco:nth-child(4) { bottom: 22%; right: 10%; animation-delay: 0.4s; font-size: 14px; }
        .splash-star-deco:nth-child(5) { top: 38%; left: 15%; animation-delay: 1.2s; font-size: 18px; }
        .splash-star-deco:nth-child(6) { top: 55%; right: 18%; animation-delay: 2s; font-size: 20px; }
        .splash-star-deco:nth-child(7) { top: 8%; left: 45%; animation-delay: 0.6s; font-size: 12px; }
        .splash-star-deco:nth-child(8) { bottom: 12%; left: 25%; animation-delay: 1.8s; font-size: 24px; }
        .splash-star-deco:nth-child(9) { top: 70%; right: 8%; animation-delay: 2.4s; font-size: 16px; }
        .splash-star-deco:nth-child(10) { bottom: 45%; right: 30%; animation-delay: 1s; font-size: 10px; }
        @keyframes starDecoFloat {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            25% { transform: translateY(-12px) rotate(15deg) scale(1.1); }
            50% { transform: translateY(-8px) rotate(-10deg) scale(0.95); }
            75% { transform: translateY(-15px) rotate(5deg) scale(1.05); }
        }
        @keyframes starDecoTwinkle {
            0%, 100% { opacity: 0.4; filter: brightness(1); }
            50% { opacity: 0.9; filter: brightness(1.3); }
        }
        
        /* 1. 模板套用在全屏 (Body) */
        html, body {
            overflow-x: hidden;
            max-width: 100%;
        }
        body {
            font-family: var(--primary-font);
            min-height: 100vh;
            min-height: 100dvh; /* 動態視窗高度，適應鍵盤 */
            width: 100%;
            overflow-y: auto;
            display: flex; align-items: center; justify-content: center;
            transition: 0.5s ease;
            background-attachment: fixed;
        }

        /* --- 七大全屏模板 --- */
        .theme-sakura { background: linear-gradient(180deg, #fff5f7 0%, #ffe4ec 25%, #ffd6e0 50%, #ffccd5 75%, #ffc2cc 100%); }
        @keyframes sakuraWarmFlow {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 0% 100%; }
        }
        .theme-sakura {
            background: linear-gradient(180deg,
                #fff8fa 0%,
                #ffe8ef 15%,
                #ffd9e3 30%,
                #ffc9d6 50%,
                #ffd9e3 70%,
                #ffe8ef 85%,
                #fff8fa 100%);
            background-size: 100% 200%;
            animation: sakuraWarmFlow 12s ease-in-out infinite;
        }
        .theme-british { background: linear-gradient(135deg, #1a1510 0%, #2a2015 50%, #1a1510 100%); }
        .theme-stage {
            background: #0d0618;
            background-image:
                /* 中央主光束 - 明艷洋紅，柔和邊緣 */
                radial-gradient(ellipse 35% 80% at 50% 0%, rgba(255, 0, 127, 0.55) 0%, rgba(255, 0, 127, 0.25) 30%, rgba(255, 0, 127, 0.08) 60%, transparent 100%),
                /* 左側光束 - 亮紫，柔和邊緣 */
                radial-gradient(ellipse 28% 70% at 25% 0%, rgba(180, 0, 255, 0.45) 0%, rgba(180, 0, 255, 0.18) 35%, rgba(180, 0, 255, 0.05) 65%, transparent 100%),
                /* 右側光束 - 亮粉，柔和邊緣 */
                radial-gradient(ellipse 28% 70% at 75% 0%, rgba(255, 20, 180, 0.45) 0%, rgba(255, 20, 180, 0.18) 35%, rgba(255, 20, 180, 0.05) 65%, transparent 100%),
                /* 頂部聚光燈源點 - 更柔和的光暈 */
                radial-gradient(ellipse 12% 8% at 50% 0%, rgba(255, 255, 255, 0.95) 0%, rgba(255, 0, 127, 0.6) 40%, transparent 100%),
                radial-gradient(ellipse 10% 7% at 25% 0%, rgba(255, 255, 255, 0.8) 0%, rgba(180, 0, 255, 0.5) 45%, transparent 100%),
                radial-gradient(ellipse 10% 7% at 75% 0%, rgba(255, 255, 255, 0.8) 0%, rgba(255, 20, 180, 0.5) 45%, transparent 100%),
                /* 氛圍光暈 */
                radial-gradient(ellipse 120% 70% at 50% 0%, rgba(255, 0, 127, 0.2) 0%, transparent 70%),
                radial-gradient(ellipse 90% 55% at 25% 5%, rgba(180, 0, 255, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse 90% 55% at 75% 5%, rgba(255, 20, 180, 0.15) 0%, transparent 60%);
        }
        /* 四葉草模板：多層綠色漸層 + 動態流動效果 */
        @keyframes cloverFlow {
        0%, 100% { background-position: 0% 0%, 50% 50%, 100% 100%; }
        33% { background-position: 100% 50%, 0% 100%, 50% 0%; }
        66% { background-position: 50% 100%, 100% 0%, 0% 50%; }
        }
        .theme-clover {
            background:
                 /* 頂部森林光暈穿透效果 */
                 radial-gradient(ellipse 80% 40% at 50% 0%, rgba(255, 255, 220, 0.35) 0%, rgba(200, 230, 180, 0.2) 30%, transparent 70%),
                 radial-gradient(ellipse 60% 35% at 30% 5%, rgba(255, 255, 200, 0.25) 0%, transparent 60%),
                 radial-gradient(ellipse 50% 30% at 70% 8%, rgba(255, 255, 210, 0.2) 0%, transparent 55%),
                 /* 多層綠色漸層 */
                 radial-gradient(ellipse 120% 80% at 20% 20%, rgba(129, 199, 132, 0.4) 0%, transparent 50%),
                 radial-gradient(ellipse 100% 70% at 80% 60%, rgba(76, 175, 80, 0.3) 0%, transparent 45%),
                 radial-gradient(ellipse 90% 60% at 40% 80%, rgba(56, 142, 60, 0.25) 0%, transparent 40%),
                 /* 基礎漸層 */
                 linear-gradient(160deg, #e8f5e9 0%, #c8e6c9 25%, #a5d6a7 50%, #81c784 75%, #a5d6a7 100%);
             background-size: 100% 100%, 100% 100%, 100% 100%, 150% 150%, 140% 140%, 130% 130%, 200% 200%;
             animation: cloverFlow 20s ease-in-out infinite;
        }
        /* 四葉草模板：文字輸入區半透明效果 */
        .theme-clover .note-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 30px 60px rgba(46, 125, 50, 0.15);
        }
        .theme-rainbow { background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffecd2, #a1c4fd, #c2e9fb, #d4fc79); }
        /* 向日葵模板：溫暖陽光漸層 */
         @keyframes sunflowerGlow {
             0%, 100% { background-position: 0% 0%, 50% 50%; }
             50% { background-position: 100% 100%, 0% 0%; }
         }
        .theme-sunflower {
            background:
                 /* 柔和金色光暈 */
                radial-gradient(ellipse 70% 50% at 75% 15%, rgba(255, 213, 79, 0.3) 0%, transparent 60%),
                 radial-gradient(ellipse 80% 60% at 25% 75%, rgba(255, 183, 77, 0.2) 0%, transparent 55%),
                 /* 溫暖漸層 */
                 linear-gradient(145deg, #fffde7 0%, #fff8e1 30%, #ffecb3 60%, #ffe082 100%);
             background-size: 120% 120%, 130% 130%, 100% 100%;
             animation: sunflowerGlow 15s ease-in-out infinite;
        }
        /* 3. 星空：深邃夜空 */
        .theme-starry {
            background: linear-gradient(135deg, #0a0e14 0%, #0d1117 50%, #0f1520 100%);
        }

        /* --- 介面佈局 --- */
        .app-wrapper {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-evenly; padding: 20px; z-index: 10;
        }

        .top-controls { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; flex-shrink: 0; }
        .toolbar-row { display: flex; gap: 6px; align-items: stretch; height: 44px; }
        .format-group { display: flex; gap: 2px; background: rgba(255,255,255,0.6); padding: 0 6px; border-radius: 12px; flex-shrink: 0; align-items: center; }
        .tool-btn { border: none; background: none; font-size: 16px; cursor: pointer; color: #333; padding: 0 10px; height: 100%; border-radius: 6px; transition: background 0.2s; display: flex; align-items: center; justify-content: center; }
        .tool-btn:hover { background: rgba(0,0,0,0.08); }
        .tool-btn:active { background: rgba(0,0,0,0.15); }

        .font-select, .btn-draw { height: 100%; border-radius: 12px; border: none; font-family: inherit; font-size: 14px; font-weight: 700; }
        .font-select { flex: 1; background: white; padding: 0 8px; min-width: 0; }
        .btn-draw { flex: 0 0 auto; padding: 0 12px; background: var(--accent-color); color: var(--accent-text); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); white-space: nowrap; position: relative; overflow: hidden; transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .btn-draw::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
            pointer-events: none;
        }
        .btn-draw.clicked {
            transform: scale(0.96);
            animation: btnGlowPulse 0.4s ease-out;
        }
        .btn-draw.clicked::after {
            animation: shimmerSweep 0.5s ease;
        }

        /* 畫布區域 */
        .card-container { width: 100%; display: flex; justify-content: center; flex-shrink: 0; }
        .note-card {
            width: 100%; max-width: 360px; border-radius: 24px; padding: 25px;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            background: var(--glass); /* 卡片本身是半透明磨砂 */
            transition: aspect-ratio 0.4s ease, height 0.4s ease;
        }

        /* 比例設定 */
        .ratio-9-16 { aspect-ratio: 9 / 16; height: 55vh; height: 55dvh; }
        .ratio-square { aspect-ratio: 1 / 1; height: 45vh; height: 45dvh; }

        #answer-editor { flex: 1; outline: none; font-size: 18px; line-height: 1.8; margin-top: 15px; color: #111; overflow-y: auto; min-height: 80px; }
        #answer-editor:empty:before { content: "在此寫下關於他/她的文字..."; opacity: 0.3; }

        /* 底部控制 */
        .control-panel { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; margin-top: 20px; flex-shrink: 0; padding-bottom: 20px; }
        .theme-selector { display: flex; justify-content: center; gap: 10px; }
        .theme-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.1); -webkit-tap-highlight-color: transparent; }

        /* Editing mode: hide date & branding when keyboard is open */
        .note-footer { transition: opacity 0.2s ease, max-height 0.25s ease; max-height: 60px; overflow: visible; }
        body.editing-mode .note-footer { opacity: 0; max-height: 0; margin-top: 0 !important; pointer-events: none; overflow: hidden; }

        .action-btns { display: flex; gap: 8px; }
        .glass-btn {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: none;
            padding: 14px;
            border-radius: 15px;
            font-family: var(--primary-font);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
            position: relative;
            color: #333;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.6),
                inset 0 -1px 0 rgba(0, 0, 0, 0.05),
                0 4px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }
        .glass-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 15px;

    <script>
        // ===== Brand Splash Screen Controller =====
        (function initSplashScreen() {
            const splash = document.getElementById('brand-splash');
            const splashLogo = splash.querySelector('.splash-logo');
            const splashSubtitle = splash.querySelector('.splash-subtitle');
            const MIN_SPLASH_DURATION = 1800; // Minimum splash display time (ms)
            const MAX_SPLASH_DURATION = 6000; // Maximum wait time before force-hiding (ms)
            const splashStartTime = Date.now();
            let fontLoaded = false;
            let minTimeElapsed = false;

            // 當字體載入完成後，啟動文字動畫
            function showSplashText() {
                if (splashLogo) splashLogo.classList.add('font-ready');
                if (splashSubtitle) splashSubtitle.classList.add('font-ready');
            }

            // Function to hide splash with fade-out
            function hideSplash() {
                if (fontLoaded && minTimeElapsed) {
                    splash.classList.add('fade-out');
                    // Remove from DOM after animation completes
                    setTimeout(() => {
                        if (splash.parentNode) {
                            splash.parentNode.removeChild(splash);
                        }
                    }, 1000);
                }
            }

            // Check minimum display time
            setTimeout(() => {
                minTimeElapsed = true;
                hideSplash();
            }, MIN_SPLASH_DURATION);

            // Force hide after maximum wait time (fallback)
            setTimeout(() => {
                fontLoaded = true;
                minTimeElapsed = true;
                showSplashText(); // 確保即使超時也顯示文字
                hideSplash();
            }, MAX_SPLASH_DURATION);

            // Load the primary font (LXGW WenKai TC)
            async function loadPrimaryFont() {
                try {
                    // Try loading both weights
                    await Promise.all([
                        document.fonts.load('400 16px "LXGW WenKai TC"'),
                        document.fonts.load('700 16px "LXGW WenKai TC"')
                    ]);
                    fontLoaded = true;
                    showSplashText(); // 字體載入完成，顯示文字動畫
                    hideSplash();
                } catch (e) {
                    // Font loading failed, still hide splash after min time
                    console.warn('Primary font loading failed:', e);
                    fontLoaded = true;
                    showSplashText(); // 即使失敗也顯示文字
                    hideSplash();
                }
            }

            // Also use document.fonts.ready as a backup
            document.fonts.ready.then(() => {
                // Check if LXGW WenKai TC is available
                if (document.fonts.check('16px "LXGW WenKai TC"')) {
                    fontLoaded = true;
                    showSplashText(); // 字體可用，顯示文字動畫
                    hideSplash();
                }
            });

            // Start font loading
            loadPrimaryFont();
        })();

        // 觸覺回饋功能
        function hapticFeedback(type = 'light') {
            if (!navigator.vibrate) return;
            switch (type) {
                case 'light':
                    navigator.vibrate(10);
                    break;
                case 'medium':
                    navigator.vibrate(20);
                    break;
                case 'heavy':
                    navigator.vibrate(30);
                    break;
                case 'success':
                    navigator.vibrate([10, 50, 20]);
                    break;
                case 'error':
                    navigator.vibrate([30, 50, 30, 50, 30]);
                    break;
            }
        }

        // ===== 音效系統 - 使用 Web Audio API 生成清澈音效 =====
        const SoundFX = (() => {
            let audioContext = null;
            let isInitialized = false;

            // 初始化 AudioContext（需在使用者互動時呼叫）
            const init = () => {
                if (isInitialized) return;
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    isInitialized = true;
                } catch (e) {
                    console.warn('AudioContext not supported:', e);
                }
            };

            // 確保 context 已就緒
            const ensureContext = async () => {
                if (!audioContext) {
                    init();
                }
                if (audioContext && audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                return audioContext;
            };

            // 抽取題目音效 - C5 + E5 同時響起的和弦
            const playDraw = async () => {
                try {
                    const ctx = await ensureContext();
                    if (!ctx) return;
                    const now = ctx.currentTime;

                    // C5 + E5 同時播放
                    const notes = [523.25, 659.25]; // C5, E5
                    notes.forEach((freq) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();

                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now);

                        gain.gain.setValueAtTime(0, now);
                        gain.gain.linearRampToValueAtTime(0.25, now + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

                        osc.connect(gain);
                        gain.connect(ctx.destination);

                        osc.start(now);
                        osc.stop(now + 0.35);
                    });
                } catch (e) { console.warn('Sound playback failed:', e); }
            };

            // 儲存成功音效 - 溫柔的成功確認音
            const playSave = async () => {
                try {
                    const ctx = await ensureContext();
                    if (!ctx) return;
                    const now = ctx.currentTime;

                    // 溫暖的低音基底 G4
                    const osc1 = ctx.createOscillator();
                    const gain1 = ctx.createGain();
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(392, now); // G4
                    gain1.gain.setValueAtTime(0, now);
                    gain1.gain.linearRampToValueAtTime(0.15, now + 0.05);
                    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                    osc1.connect(gain1);
                    gain1.connect(ctx.destination);
                    osc1.start(now);
                    osc1.stop(now + 0.7);

                    // 中音 B4 - 稍微延遲進入
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(493.88, now + 0.03); // B4
                    gain2.gain.setValueAtTime(0, now + 0.03);
                    gain2.gain.linearRampToValueAtTime(0.12, now + 0.08);
                    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start(now + 0.03);
                    osc2.stop(now + 0.6);

                    // 高音 D5 - 點綴成功感
                    const osc3 = ctx.createOscillator();
                    const gain3 = ctx.createGain();
                    osc3.type = 'sine';
                    osc3.frequency.setValueAtTime(587.33, now + 0.06); // D5
                    gain3.gain.setValueAtTime(0, now + 0.06);
                    gain3.gain.linearRampToValueAtTime(0.1, now + 0.1);
                    gain3.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    osc3.connect(gain3);
                    gain3.connect(ctx.destination);
                    osc3.start(now + 0.06);
                    osc3.stop(now + 0.55);
                } catch (e) { console.warn('Sound playback failed:', e); }
            };

            // 歷史記錄音效 - 輕柔的開啟音，像翻開書頁
            const playHistory = async () => {
                try {
                    const ctx = await ensureContext();
                    if (!ctx) return;
                    const now = ctx.currentTime;

                    // 柔和的滑音
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();

                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(392, now); // G4
                    osc.frequency.exponentialRampToValueAtTime(523.25, now + 0.12); // 滑至 C5

                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.3, now + 0.03);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.35);

                    // 輕微的高頻點綴
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(1046.5, now + 0.08); // C6
                    gain2.gain.setValueAtTime(0, now + 0.08);
                    gain2.gain.linearRampToValueAtTime(0.15, now + 0.1);
                    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start(now + 0.08);
                    osc2.stop(now + 0.3);
                } catch (e) { console.warn('Sound playback failed:', e); }
            };

            return { init, playDraw, playSave, playHistory };
        })();

        // 為所有互動元素添加觸覺回饋
        document.addEventListener('DOMContentLoaded', () => {

            document.addEventListener('click', (e) => {

                SoundFX.init();

                const target = e.target;
                if (target.matches('button, .btn-draw, .tool-btn, .theme-dot, .ratio-btn, .date-action-btn, .history-btn')) {

                    const btn = target.matches('.btn-draw, .btn-save') ? target : target.closest('.btn-draw, .btn-save');
                    btn.classList.remove('clicked');

                    btn.classList.add('clicked');
                    setTimeout(() => btn.classList.remove('clicked'), 500);
                }
            });

            // Escape 鍵關閉歷史面板
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    const historyOverlay = document.getElementById('history-panel-overlay');
                    if (historyOverlay && historyOverlay.classList.contains('active')) {

                    }
                }
            });
        });

        function checkFontLoaded(fontFamily) {
            const cleanName = fontFamily.replace(/'/g, '');
            if (fontLoadStatus[cleanName]) return true;

            try {
                // document.fonts.check() is synchronous
                const loaded = document.fonts.check(`16px "${cleanName}"`);

                }
                return false;
            } catch (e) {

        // 字體 URL 對應表
        const fontUrls = {
            'PopGothic': 'https://cdn.jsdelivr.net/gh/max32002/pop-gothic@2.143/webfont/CJK%20TC/PopGothicCjkTc-Regular.woff2',
            'JasonHandwriting1': 'https://cdn.jsdelivr.net/gh/max32002/JasonHandWritingFonts@20240409/webfont/JasonHandwriting1-Regular.woff2',

        // 使用 FontFace API 強制載入字體（含重試機制）
        async function loadFontWithRetry(fontName, maxRetries = 3) {
            const url = fontUrls[fontName];
            if (!url) {
                // 非自訂字體，使用原生 API
                await document.fonts.load(`16px "${fontName}"`);
                return document.fonts.check(`16px "${fontName}"`);
            }

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    // 使用 FontFace API 直接載入
                    const fontFace = new FontFace(fontName, `url(${url})`, { weight: '400', display: 'swap' });
                    await fontFace.load();
                    document.fonts.add(fontFace);
                    return true;
                } catch (e) {
                    console.warn(`Font load attempt ${attempt}/${maxRetries} failed for ${fontName}:`, e);
                    if (attempt < maxRetries) {
                        // 等待後重試（指數退避）
                        await new Promise(r => setTimeout(r, 500 * attempt));
                    }
                }
            }
            return false;
        }

        async function changeFont(font) {
            const cleanFont = font.replace(/'/g, '');
            const displayName = getFontDisplayName(cleanFont);

            // 定義帶備用字體的 font-family 字串
            const fontWithFallback = `"${cleanFont}", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif`;

            // 先檢查字體是否已載入 (synchronous check)
            const isLoaded = checkFontLoaded(cleanFont);

            if (!isLoaded) {
                // 顯示載入中提示
                showFontLoadingToast(displayName);

                let loadTimedOut = false;
                // 設定超時保護（最多顯示 8 秒，給重試留時間）
                const timeoutId = setTimeout(() => {
                    loadTimedOut = true;
                    currentFont = cleanFont;
                    document.getElementById('capture-area').style.fontFamily = fontWithFallback;
                    // 超時視為載入失敗
                    showFontErrorToast(displayName);
                }, 8000);

                try {
                    // 使用重試機制載入字體
                    const success = await loadFontWithRetry(cleanFont);

                    // 如果已超時，不再處理
                    if (loadTimedOut) return;

                    clearTimeout(timeoutId);

                    // 更新狀態
                    fontLoadStatus[cleanFont] = success;

                    // 套用字體（含備用）
                    currentFont = cleanFont;
                    document.getElementById('capture-area').style.fontFamily = fontWithFallback;

                    // 根據實際載入結果顯示提示
                    if (success) {
                        showFontReadyToast(displayName);
                    } else {
                        showFontErrorToast(displayName);
                    }
                } catch (e) {
                    if (loadTimedOut) return;
                    clearTimeout(timeoutId);
                    // 載入失敗，使用備用字體
                    currentFont = cleanFont;
                    document.getElementById('capture-area').style.fontFamily = fontWithFallback;
                    showFontErrorToast(displayName);
                }
            } else {
                // 字體已載入，直接套用（含備用）
                currentFont = cleanFont;
                document.getElementById('capture-area').style.fontFamily = fontWithFallback;
            }
            debouncedSaveDraft();
        }

        // 繪製圓角矩形
        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // 文字換行處理
        function wrapText(ctx, text, maxWidth) {
            const lines = [];
            const paragraphs = text.split('\n');
            for (const para of paragraphs) {
                if (!para) { lines.push(''); continue; }
                let line = '';
                for (const char of para) {
                    const testLine = line + char;
                    if (ctx.measureText(testLine).width > maxWidth && line) {
                        lines.push(line);
                        line = char;
                    } else {
                        line = testLine;
                    }
                }
                if (line) lines.push(line);
            }
            return lines;
        }

        // 繪製愛心
        function drawHeart(ctx, x, y, size, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(size / 20, size / 20);
            ctx.beginPath();
            ctx.moveTo(0, -5);
            ctx.bezierCurveTo(-5, -15, -15, -5, 0, 10);
            ctx.bezierCurveTo(15, -5, 5, -15, 0, -5);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
            ctx.restore();
        }

        // 繪製四葉草（心形葉片，帶陰影和立體感）
         function drawClover(ctx, x, y, size, color, withShadow = true) {
            ctx.save();
            ctx.translate(x, y);

             // 繪製單片心形葉子
             function drawHeartLeaf(leafSize, opacity) {
                 ctx.beginPath();
                 const lx = 0;
                 const ly = -leafSize * 0.35;
                 const w = leafSize * 0.4;
                 const h = leafSize * 0.55;
                 // 心形路徑
                 ctx.moveTo(lx, ly - h * 0.3);
                 ctx.bezierCurveTo(lx - w * 0.8, ly - h * 0.9, lx - w * 1.1, ly - h * 0.1, lx, ly + h * 0.5);
                 ctx.bezierCurveTo(lx + w * 1.1, ly - h * 0.1, lx + w * 0.8, ly - h * 0.9, lx, ly - h * 0.3);
                 ctx.closePath();
             }
 
             // 添加柔和陰影
             if (withShadow) {
                 ctx.shadowColor = 'rgba(30, 80, 30, 0.25)';
                 ctx.shadowBlur = size * 0.15;
                 ctx.shadowOffsetX = size * 0.05;
                 ctx.shadowOffsetY = size * 0.08;
             }
 
             // 繪製4片心形葉子
             for (let i = 0; i < 4; i++) {
                 // 提取顏色的 alpha 值
                 const colorMatch = color.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
                 if (colorMatch) {
                     const r = parseInt(colorMatch[1]);
                     const g = parseInt(colorMatch[2]);
                     const b = parseInt(colorMatch[3]);
                     const a = colorMatch[4] ? parseFloat(colorMatch[4]) : 1;
 
                     // 創建漸層效果（深到淺綠）
                     const gradient = ctx.createRadialGradient(0, -size * 0.3, 0, 0, -size * 0.3, size * 0.6);
                     gradient.addColorStop(0, `rgba(${Math.max(0, r - 30)}, ${Math.min(255, g + 20)}, ${Math.max(0, b - 20)}, ${a})`);
                     gradient.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${a})`);
                     gradient.addColorStop(1, `rgba(${Math.max(0, r - 50)}, ${Math.max(0, g - 30)}, ${Math.max(0, b - 30)}, ${a * 0.8})`);
                     ctx.fillStyle = gradient;
                 } else {
                     ctx.fillStyle = color;
                 }
       
                 drawHeartLeaf(size, 1);
                 ctx.fill();
 
                 // 葉脈高光
                 ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                 ctx.lineWidth = size * 0.02;
                ctx.beginPath();
                ctx.moveTo(0, -size * 0.15);
                 ctx.lineTo(0, -size * 0.5);
                 ctx.stroke();
                 
                 ctx.rotate(Math.PI / 2);
                 }

        // 中心點
             ctx.shadowColor = 'transparent';
             ctx.beginPath();
             
             ctx.fillStyle = 'rgba(56, 142, 60, 0.6)';
             ctx.fill();
 
             ctx.restore();
         }
        
        // 繪製向日葵（花瓣 + 籽粒紋理 + 自然曲線 + 金色光暈）
        function drawSunflower(ctx, x, y, size, petalColor, centerColor, withGlow = true) {
            ctx.save();
            ctx.translate(x,y);
            
            // 提取花瓣顏色的透明度
             const petalMatch = petalColor.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
             const petalAlpha = petalMatch && petalMatch[4] ? parseFloat(petalMatch[4]) : 1;
 
             // 柔和金色光暈
            if (withGlow && size > 30) {
                const glowGradient = ctx.createRadialGradient(0, 0, size * 0.3, 0, 0, size * 1.3);
                glowGradient.addColorStop(0, `rgba(255, 220, 100, ${petalAlpha * 0.25})`);
                glowGradient.addColorStop(0.5, `rgba(255, 200, 80, ${petalAlpha * 0.12})`);
                glowGradient.addColorStop(1, 'rgba(255, 200, 80, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, size * 1.3, 0, Math.PI * 2);
                ctx.fill();
            }
        // 繪製花瓣（尖端變窄的自然曲線，金黃到橙色漸層）
            const petalCount = 14;
            for (let i = 0; i < petalCount; i++) {
                ctx.save();
                ctx.rotate((i / petalCount) * Math.PI * 2);

                // 花瓣漸層：金黃 -> 橙色
                const petalGradient = ctx.createLinearGradient(0, -size * 0.35, 0, -size * 0.85);
                petalGradient.addColorStop(0, `rgba(255, 193, 7, ${petalAlpha})`);     // 金黃色（根部）
                petalGradient.addColorStop(0.4, `rgba(255, 167, 38, ${petalAlpha})`);  // 橙黃色
                petalGradient.addColorStop(0.7, `rgba(255, 152, 0, ${petalAlpha})`);   // 橙色
                petalGradient.addColorStop(1, `rgba(255, 111, 0, ${petalAlpha * 0.9})`); // 深橙色（尖端）

                ctx.fillStyle = petalGradient;

                // 繪製尖端變窄的花瓣形狀
                ctx.beginPath();
                const petalLength = size * 0.5;
                const baseWidth = size * 0.13;
                const tipWidth = size * 0.04;

                ctx.moveTo(-baseWidth, -size * 0.32);
                // 左側曲線（自然彎曲）
                ctx.bezierCurveTo(
                    -baseWidth * 1.2, -size * 0.5,
                    -tipWidth * 2, -size * 0.75,
                    0, -size * 0.85
                );
                // 右側曲線
                ctx.bezierCurveTo(
                    tipWidth * 2, -size * 0.75,
                    baseWidth * 1.2, -size * 0.5,
                    baseWidth, -size * 0.32
                );
                ctx.closePath();
                ctx.fill();

                // 花瓣中線高光
                ctx.strokeStyle = `rgba(255, 245, 200, ${petalAlpha * 0.3})`;
                ctx.lineWidth = size * 0.015;
                ctx.beginPath();
                ctx.moveTo(0, -size * 0.35);
                ctx.lineTo(0, -size * 0.7);
                ctx.stroke();

                ctx.restore();
            }

            // 花心底色
            const centerMatch = centerColor.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
            const centerAlpha = centerMatch && centerMatch[4] ? parseFloat(centerMatch[4]) : 1;

            // 花心漸層（邊緣深，中心淺）
            const centerGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.35);
            centerGradient.addColorStop(0, `rgba(90, 60, 40, ${centerAlpha})`);
            centerGradient.addColorStop(0.5, `rgba(121, 85, 72, ${centerAlpha})`);
            centerGradient.addColorStop(0.85, `rgba(78, 52, 46, ${centerAlpha})`);
            centerGradient.addColorStop(1, `rgba(62, 39, 35, ${centerAlpha})`);
            
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.35, 0, Math.PI * 2);
            ctx.fillStyle = centerGradient;
            ctx.fill();

            // 籽粒紋理效果（螺旋排列小點）
            if (size > 25) {
                const seedCount = Math.min(Math.floor(size * 0.8), 60);
                const goldenAngle = Math.PI * (3 - Math.sqrt(5)); // 黃金角度

                for (let i = 1; i <= seedCount; i++) {
                    const angle = i * goldenAngle;
                    const radius = Math.sqrt(i / seedCount) * size * 0.3;
                    const seedX = Math.cos(angle) * radius;
                    const seedY = Math.sin(angle) * radius;
                    const seedSize = (size * 0.025) * (1 - (radius / (size * 0.35)) * 0.4);

                    // 籽粒
                    ctx.beginPath();
                    ctx.arc(seedX, seedY, seedSize, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(50, 35, 25, ${centerAlpha * 0.7})`;
                    ctx.fill();

                    // 籽粒高光
                    if (i % 3 === 0) {
                        ctx.beginPath();
                        ctx.arc(seedX - seedSize * 0.3, seedY - seedSize * 0.3, seedSize * 0.4, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 220, 180, ${centerAlpha * 0.3})`;
                        ctx.fill();
                    }
                }
            }
            ctx.restore();
        
        }

        // 核心儲存邏輯 - 純 Canvas 繪製
        function handleSave() {
            if (!isDrawn) { showAlert("請先抽取題目！"); return; }
            const answerText = document.getElementById('answer-editor').innerText.trim();
            if (!answerText) { showAlert("請寫下你的心情記錄。"); return; }

            const btn = document.getElementById('save-btn');
            const originalText = btn.innerText;
            btn.innerText = "生成中...";
            btn.disabled = true;

            try {
                const captureArea = document.getElementById('capture-area');
                const bodyClass = document.getElementById('full-body').className;
                const colors = themeColors[bodyClass] || ['#ffffff', '#f0f0f0'];
                const isSquare = captureArea.classList.contains('ratio-square');

                // 設置畫布尺寸
                const outputWidth = 1080;
                const outputHeight = isSquare ? 1080 : 1920;

                const canvas = document.createElement('canvas');
                canvas.width = outputWidth;
                canvas.height = outputHeight;
                const ctx = canvas.getContext('2d');

                // 1. 繪製漸變背景
                if (bodyClass === 'theme-rainbow') {
                    // 彩虹漸變特殊處理
                    const rainbowGradient = ctx.createLinearGradient(0, 0, outputWidth, outputHeight);
                    rainbowGradient.addColorStop(0, '#ff9a9e');
                    rainbowGradient.addColorStop(0.2, '#fad0c4');
                    rainbowGradient.addColorStop(0.4, '#ffecd2');
                    rainbowGradient.addColorStop(0.6, '#a1c4fd');
                    rainbowGradient.addColorStop(0.8, '#c2e9fb');
                    rainbowGradient.addColorStop(1, '#d4fc79');
                    ctx.fillStyle = rainbowGradient;
                    ctx.fillRect(0, 0, outputWidth, outputHeight);
                    // 添加流動光帶效果
                    const waveColors = [
                        'rgba(255, 154, 158, 0.25)',
                        'rgba(250, 208, 196, 0.25)',
                        'rgba(255, 236, 210, 0.25)',
                        'rgba(161, 196, 253, 0.25)',
                        'rgba(194, 233, 251, 0.25)'
                    ];
                    for (let i = 0; i < 5; i++) {
                        const yBase = (outputHeight * 0.15) + (i * outputHeight * 0.18);
                        ctx.beginPath();
                        ctx.moveTo(0, yBase);
                        for (let x = 0; x <= outputWidth; x += 20) {
                            const y = yBase + Math.sin(x * 0.008 + i * 0.8) * 60 + Math.sin(x * 0.005 + i * 0.5) * 40;
                            ctx.lineTo(x, y);
                        }
                        ctx.lineTo(outputWidth, outputHeight);
                        ctx.lineTo(0, outputHeight);
                        ctx.closePath();
                        ctx.fillStyle = waveColors[i % waveColors.length];
                        ctx.fill();
                    }
                    // 添加光點
                    for (let i = 0; i < 30; i++) {
                        const x = Math.random() * outputWidth;
                        const y = Math.random() * outputHeight;
                        const size = Math.random() * 8 + 4;
                        const opacity = Math.random() * 0.3 + 0.1;
                        const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
                        gradient.addColorStop(0, `rgba(255, 255, 255, ${opacity})`);
                        gradient.addColorStop(1, 'transparent');
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(x, y, size * 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else if (bodyClass === 'theme-stage') {
                    // 舞台仿真聚光燈光束效果 - 柔和邊緣
                    ctx.fillStyle = '#0d0618';
                    ctx.fillRect(0, 0, outputWidth, outputHeight);

                    // 繪製柔和邊緣光束函數（使用橢圓漸層取代尖銳邊緣）
                    function drawSoftSpotlightBeam(ctx, centerX, colorRGB, opacity, widthRatio, heightRatio) {
                        const gradient = ctx.createRadialGradient(
                            centerX, 0, 0,
                            centerX, outputHeight * heightRatio, outputWidth * widthRatio
                        );
                        gradient.addColorStop(0, `rgba(${colorRGB}, ${opacity})`);
                        gradient.addColorStop(0.25, `rgba(${colorRGB}, ${opacity * 0.6})`);
                        gradient.addColorStop(0.5, `rgba(${colorRGB}, ${opacity * 0.25})`);
                        gradient.addColorStop(0.75, `rgba(${colorRGB}, ${opacity * 0.08})`);
                        gradient.addColorStop(1, 'transparent');
                        ctx.fillStyle = gradient;
                        ctx.fillRect(0, 0, outputWidth, outputHeight);
                    }

                    // 中央主光束 - 明艷洋紅，柔和邊緣
                    drawSoftSpotlightBeam(ctx, outputWidth * 0.5, '255, 0, 127', 0.55, 0.35, 0.8);

                    // 左側光束 - 亮紫色，柔和邊緣
                    drawSoftSpotlightBeam(ctx, outputWidth * 0.25, '180, 0, 255', 0.45, 0.28, 0.7);

                    // 右側光束 - 亮粉色，柔和邊緣
                    drawSoftSpotlightBeam(ctx, outputWidth * 0.75, '255, 20, 180', 0.45, 0.28, 0.7);

                    // 頂部光源亮點
                    const lights = [
                        { x: 0.5, color: 'rgba(255, 0, 127, 0.95)', size: 45 },
                        { x: 0.25, color: 'rgba(180, 0, 255, 0.9)', size: 35 },
                        { x: 0.75, color: 'rgba(255, 20, 180, 0.9)', size: 35 }
                    ];
                    lights.forEach(light => {
                        // 外暈
                        const outerGlow = ctx.createRadialGradient(
                            outputWidth * light.x, 0, 0,
                            outputWidth * light.x, 0, light.size * 3
                        );
                        outerGlow.addColorStop(0, light.color);
                        outerGlow.addColorStop(0.3, light.color.replace(/[\d.]+\)$/, '0.5)'));
                        outerGlow.addColorStop(1, 'transparent');
                        ctx.fillStyle = outerGlow;
                        ctx.fillRect(0, 0, outputWidth, outputHeight * 0.2);

                        // 中心白芯
                        const coreGlow = ctx.createRadialGradient(
                            outputWidth * light.x, 0, 0,
                            outputWidth * light.x, 0, light.size * 0.8
                        );
                        coreGlow.addColorStop(0, 'rgba(255, 255, 255, 1)');
                        coreGlow.addColorStop(0.4, 'rgba(255, 255, 255, 0.8)');
                        coreGlow.addColorStop(1, 'transparent');
                        ctx.fillStyle = coreGlow;
                        ctx.fillRect(0, 0, outputWidth, outputHeight * 0.1);
                    });

                    // 環境氛圍光
                    const ambientGlow = ctx.createRadialGradient(
                        outputWidth / 2, outputHeight * 0.3, 0,
                        outputWidth / 2, outputHeight * 0.3, outputHeight * 0.6
                    );
                    ambientGlow.addColorStop(0, 'rgba(255, 0, 127, 0.08)');
                    ambientGlow.addColorStop(0.5, 'rgba(140, 0, 200, 0.05)');
                    ambientGlow.addColorStop(1, 'transparent');
                    ctx.fillStyle = ambientGlow;
                    ctx.fillRect(0, 0, outputWidth, outputHeight);

                    // 中央偏上煙霧粒子 - 深灰紫色（類似背景色）
                    for (let i = 0; i < 45; i++) {
                        const x = Math.random() * outputWidth;
                        const y = outputHeight * 0.2 + Math.random() * outputHeight * 0.35; // 中央偏上位置 (20% - 55% 高度)
                        const size = Math.random() * 140 + 70;
                        const opacity = Math.random() * 0.18 + 0.1;

                        const smokeGrad = ctx.createRadialGradient(x, y, 0, x, y, size);
                        smokeGrad.addColorStop(0, `rgba(65, 50, 80, ${opacity * 1.5})`);
                        smokeGrad.addColorStop(0.3, `rgba(55, 42, 70, ${opacity * 1.2})`);
                        smokeGrad.addColorStop(0.6, `rgba(45, 35, 60, ${opacity * 0.7})`);
                        smokeGrad.addColorStop(1, 'transparent');
                        ctx.fillStyle = smokeGrad;
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // 中央偏上煙霧漸層 - 深灰紫色
                    const stageSmokeGrad = ctx.createLinearGradient(0, outputHeight * 0.15, 0, outputHeight * 0.55);
                    stageSmokeGrad.addColorStop(0, 'transparent');
                    stageSmokeGrad.addColorStop(0.3, 'rgba(60, 48, 75, 0.25)');
                    stageSmokeGrad.addColorStop(0.5, 'rgba(50, 40, 65, 0.4)');
                    stageSmokeGrad.addColorStop(0.7, 'rgba(60, 48, 75, 0.25)');
                    stageSmokeGrad.addColorStop(1, 'transparent');
                    ctx.fillStyle = stageSmokeGrad;
                    ctx.fillRect(0, outputHeight * 0.15, outputWidth, outputHeight * 0.45);

                    // 繪製螢光棒（應援手燈）- 靜態版本用於匯出
                    const exportLightstickColors = [
                        { r: 255, g: 0, b: 100 },
                        { r: 0, g: 200, b: 255 },
                        { r: 255, g: 100, b: 0 },
                        { r: 180, g: 0, b: 255 },
                        { r: 0, g: 255, b: 150 },
                        { r: 255, g: 220, b: 0 },
                        { r: 255, g: 50, b: 150 },
                        { r: 100, g: 100, b: 255 },
                    ];
                    // 靜態版本螢光棒 - 分8行排列，模擬景深效果
                    const exportRowCount = 8;
                    const exportSticksPerRow = Math.floor(outputWidth / 50);
                    const exportAreaTop = outputHeight * 0.52;
                    const exportAreaHeight = outputHeight * 0.48;

                    // 計算景深效果的行位置（使用較平緩的緩入函數，避免底部間距過大）
                    const exportRowYCache = [];
                    const getExportRowY = (rowIndex) => {
                        if (exportRowYCache[rowIndex] !== undefined) return exportRowYCache[rowIndex];
                        const t = rowIndex / (exportRowCount - 1);
                        const eased = Math.pow(t, 1.5); // 1.5次方緩入，底部間距適中
                        let y = exportAreaTop + exportAreaHeight * 0.05 + eased * exportAreaHeight * 0.92;
                        // 確保行距最小為0（不與前一行重疊）
                        if (rowIndex > 0) {
                            const prevY = getExportRowY(rowIndex - 1);
                            y = Math.max(y, prevY); // 確保當前行Y >= 前一行Y
                        }
                        exportRowYCache[rowIndex] = y;
                        return y;
                    };

                    // 計算景深效果的螢光棒長度（底部近=長，頂部遠=短）
                    const getExportStickLength = (rowIndex) => {
                        // 頂部(row 0)最短15px，底部(row 7)最長45px
                        const maxLength = 45;
                        const minLength = 15;
                        const t = rowIndex / (exportRowCount - 1);
                        return minLength + t * (maxLength - minLength);
                    };

                    // 從遠到近創建（先畫遠處，後畫近處覆蓋）
                    for (let row = 0; row < exportRowCount; row++) {
                        const rowY = getExportRowY(row);
                        const rowOffset = (row % 2) * (outputWidth / exportSticksPerRow / 2);
                        // 景深效果：底部(近處)螢光棒較少，頂部(遠)螢光棒較多
                        const depthMultiplier = 1 - (row / (exportRowCount - 1)) * 0.5; // 頂部1.0，底部0.5
                        const actualSticksInRow = Math.floor(exportSticksPerRow * depthMultiplier) + 3;
                        const depthFactor = 0.6 + (row / (exportRowCount - 1)) * 0.4; // 頂部0.6，底部1.0

                        for (let i = 0; i < actualSticksInRow; i++) {
                        const color = exportLightstickColors[(row * exportSticksPerRow + i) % exportLightstickColors.length];
                        const stickX = rowOffset + (i / actualSticksInRow) * outputWidth + (Math.random() - 0.5) * 20;
                        const stickLength = getExportStickLength(row); // 景深長度
                        const stickWidth = (Math.random() * 2 + 4) * depthFactor;
                        // 大幅度擺動角度：隨機選擇向左(-1)或向右(+1)，角度範圍 0.45~0.75 弧度（約 26°~43°）
                        const swingDirection = Math.random() < 0.5 ? -1 : 1;
                        const swingAngle = swingDirection * (Math.random() * 0.3 + 0.45);
                        const baseY = rowY;
                        const tipX = stickX + Math.sin(swingAngle) * stickLength;
                        const tipY = baseY - Math.cos(swingAngle) * stickLength;
                        const { r, g, b } = color;
                        const glow = 0.85 * depthFactor; // 遠處較暗

                        ctx.save();
                        ctx.lineCap = 'round';

                        // 外層光暈
                        ctx.lineWidth = stickWidth + 16;
                        ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${glow * 0.15})`;
                        ctx.beginPath();
                        ctx.moveTo(stickX, baseY);
                        ctx.lineTo(tipX, tipY);
                        ctx.stroke();

                        // 內層光暈
                        ctx.lineWidth = stickWidth + 8;
                        ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${glow * 0.35})`;
                        ctx.beginPath();
                        ctx.moveTo(stickX, baseY);
                        ctx.lineTo(tipX, tipY);
                        ctx.stroke();

                        // 主體
                        ctx.lineWidth = stickWidth;
                        const stickGrad = ctx.createLinearGradient(stickX, baseY, tipX, tipY);
                        stickGrad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${glow * 0.6})`);
                        stickGrad.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, ${glow * 0.9})`);
                        stickGrad.addColorStop(0.7, `rgba(${Math.min(255, r + 50)}, ${Math.min(255, g + 50)}, ${Math.min(255, b + 50)}, ${glow})`);
                        stickGrad.addColorStop(1, `rgba(255, 255, 255, ${glow * 0.9})`);
                        ctx.strokeStyle = stickGrad;
                        ctx.beginPath();
                        ctx.moveTo(stickX, baseY);
                        ctx.lineTo(tipX, tipY);
                        ctx.stroke();

                        // 頂端發光點
                        const tipGlow = ctx.createRadialGradient(tipX, tipY, 0, tipX, tipY, stickWidth * 4);
                        tipGlow.addColorStop(0, `rgba(255, 255, 255, ${glow * 0.95})`);
                        tipGlow.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, ${glow * 0.7})`);
                        tipGlow.addColorStop(0.6, `rgba(${r}, ${g}, ${b}, ${glow * 0.3})`);
                        tipGlow.addColorStop(1, 'transparent');
                        ctx.fillStyle = tipGlow;
                        ctx.beginPath();
                        ctx.arc(tipX, tipY, stickWidth * 4, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.restore();
                        }
                    }
                } else if (bodyClass === 'theme-sunflower') {
                    // 向日葵淺色漸變 + 丁達爾日照效果
                    const sunGradient = ctx.createLinearGradient(0, 0, outputWidth, outputHeight);
                    sunGradient.addColorStop(0, '#fffde7');
                    sunGradient.addColorStop(0.5, '#fff8e1');
                    sunGradient.addColorStop(1, '#ffecb3');
                    ctx.fillStyle = sunGradient;
                    ctx.fillRect(0, 0, outputWidth, outputHeight);

                    // 丁達爾效應 - 大範圍柔和陽光
                    const sunX = outputWidth * 0.85;
                    const sunY = -outputHeight * 0.05;
                    const sunGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, outputHeight * 1.2);
                    sunGlow.addColorStop(0, 'rgba(255, 248, 200, 0.3)');
                    sunGlow.addColorStop(0.2, 'rgba(255, 243, 180, 0.2)');
                    sunGlow.addColorStop(0.5, 'rgba(255, 235, 150, 0.1)');
                    sunGlow.addColorStop(1, 'rgba(255, 230, 130, 0)');
                    ctx.fillStyle = sunGlow;
                    ctx.fillRect(0, 0, outputWidth, outputHeight);

                    // 丁達爾光束
                    const beamCount = 5;
                    for (let i = 0; i < beamCount; i++) {
                        const beamOpacity = 0.08;
                        const beamWidth = 100;
                        const angle = -Math.PI * 0.7 + (i - beamCount / 2) * 0.12;
                        const beamLength = Math.max(outputWidth, outputHeight) * 1.5;

                        ctx.save();
                        ctx.translate(sunX, sunY);
                        ctx.rotate(angle);

                        const beamGradient = ctx.createLinearGradient(0, 0, beamLength, 0);
                        beamGradient.addColorStop(0, `rgba(255, 250, 220, ${beamOpacity * 1.5})`);
                        beamGradient.addColorStop(0.3, `rgba(255, 245, 200, ${beamOpacity})`);
                        beamGradient.addColorStop(0.7, `rgba(255, 240, 180, ${beamOpacity * 0.5})`);
                        beamGradient.addColorStop(1, 'rgba(255, 235, 160, 0)');

                        ctx.fillStyle = beamGradient;
                        ctx.beginPath();
                        ctx.moveTo(0, -beamWidth * 0.3);
                        ctx.lineTo(beamLength, -beamWidth * 0.8);
                        ctx.lineTo(beamLength, beamWidth * 0.8);
                        ctx.lineTo(0, beamWidth * 0.3);
                        ctx.closePath();
                        ctx.fill();
                        ctx.restore();

                    // 懸浮塵埃微粒
                    for (let i = 0; i < 40; i++) {

                        const dustGlow = ctx.createRadialGradient(dustX, dustY, 0, dustX, dustY, dustSize * 5);
                        dustGlow.addColorStop(0, `rgba(255, 250, 230, ${dustOpacity})`);
                        dustGlow.addColorStop(0.5, `rgba(255, 245, 200, ${dustOpacity * 0.4})`);
                        dustGlow.addColorStop(1, 'rgba(255, 240, 180, 0)');
                        ctx.fillStyle = dustGlow;
                        ctx.beginPath();
                        ctx.arc(dustX, dustY, dustSize * 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    const gradient = ctx.createLinearGradient(0, 0, outputWidth, outputHeight);
                    gradient.addColorStop(0, colors[0]);
                    gradient.addColorStop(1, colors[1]);
                    ctx.fillStyle = gradient;

                            ctx.save();

                            const scale = size / 24;
                            ctx.scale(scale, scale);

                            // 繪製愛心形狀
                            ctx.beginPath();
                            ctx.moveTo(0, -6);
                            ctx.bezierCurveTo(-2, -12, -12, -12, -12, -2);

                            ctx.bezierCurveTo(12, -12, 2, -12, 0, -6);
                            ctx.closePath();

                            // 漸層填
                           const gradient = ctx.createLinearGradient(-8, -10, 8, 10);
                            gradient.addColorStop(0, `rgba(255, 182, 193, ${config.baseOpacity})`);
                            gradient.addColorStop(0.5, `rgba(255, 105, 140, ${config.baseOpacity * 0.9})`);
                            gradient.addColorStop(1, `rgba(255, 130, 160, ${config.baseOpacity * 0.8})`);
                            ctx.fillStyle = gradient;
                            ctx.fill();

                            // 高光效果
                            ctx.beginPath();
                            ctx.ellipse(-5, -6, 3, 2.5, -0.5, 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(255, 255, 255, ${config.baseOpacity * 0.6})`;
                            ctx.fill();

                            ctx.restore();
                        }
                    });

                    // 閃爍粉色光點（避免使用 transparent 導致黑邊）
                    for (let i = 0; i < 30; i++) {

                        const y = Math.random() * outputHeight;

                        const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 4);

                        gradient.addColorStop(0.4, `rgba(255, 200, 215, ${opacity * 0.5})`);
                        gradient.addColorStop(0.7, `rgba(255, 182, 193, ${opacity * 0.15})`);
                        gradient.addColorStop(1, 'rgba(255, 182, 193, 0)');
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(x, y, size * 4, 0, Math.PI * 2);
                        ctx.fill();

                        // 中心亮點
                        ctx.beginPath();
                        ctx.arc(x, y, size * 0.6, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 255, ${opacity * 0.95})`;

                    }
                } else if (bodyClass === 'theme-british') {
                    // 金色流沙主題：散落金沙金箔
                    // 細沙粒子
                    for (let i = 0; i < 200; i++) {

                        const y = Math.random() * outputHeight;
                        const size = Math.random() * 6 + 2;

                        ctx.fillStyle = gradient;

                        ctx.lineTo(-size * 0.5, size * 0.4);

                } else if (bodyClass === 'theme-clover') {

                            if (attempts < 50) {

                    });
                    // 露珠光點
                    for (let i = 0; i < 50; i++) {

                        // 露   外層光暈
                        const dewGlow = ctx.createRadialGradient(x, y, 0, x, y, size * 2.5);

                        dewGlow.addColorStop(1, 'rgba(150, 255, 200, 0)');
                        ctx.fillStyle = dewGlow;
                        ctx.beginPath();
                        ctx.arc(x, y, size * 2.5, 0, Math.PI * 2);
                        ctx.fill();

                        // 露珠主體
                        const dewBody = ctx.createRadialGradient(x - size * 0.2, y - size * 0.2, 0, x, y, size);
                        dewBody.addColorStop(0, `rgba(255, 255, 255, ${opacity})`);
                        dewBody.addColorStop(0.5, `rgba(220, 255, 240, ${opacity * 0.7})`);
                        dewBody.addColorStop(1, `rgba(180, 240, 220, ${opacity * 0.3})`);
                        ctx.fillStyle = dewBody;
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);

                        // 露珠高光點
                        ctx.beginPath();
                        ctx.arc(x - size * 0.3, y - size * 0.3, size * 0.35, 0, Math.PI * 2);

                } else if (bodyClass === 'theme-sunflower') {

                        { count: 8, minSize: 30, maxSize: 55, petalOpacity: 0.18, centerOpacity: 0.90 },    // 小

                            if (attempts < 50) {

                    });
                    // 金色花粉粒子
                    for (let i = 0; i < 80; i++) {

                        const y = Math.random() * outputHeight;
                        const size = Math.random() * 4 + 2;

                        // 花粉外層光暈

                        pollenGlow.addColorStop(0, `rgba(255, 215, 0, ${opacity * 0.6})`);
                        pollenGlow.addColorStop(0.5, `rgba(255, 193, 7, ${opacity * 0.3})`);
                        pollenGlow.addColorStop(1, 'rgba(255, 180, 0, 0)');
                        ctx.fillStyle = pollenGlow;
                        ctx.beginPath();
                        ctx.arc(x, y, size * 3, 0, Math.PI * 2);
                        ctx.fill();

                        // 花粉主體
                        const pollenBody = ctx.createRadialGradient(x - size * 0.2, y - size * 0.2, 0, x, y, size);
                        pollenBody.addColorStop(0, `rgba(255, 235, 130, ${opacity})`);
                        pollenBody.addColorStop(0.5, `rgba(255, 200, 50, ${opacity * 0.9})`);
                        pollenBody.addColorStop(1, `rgba(255, 165, 0, ${opacity * 0.7})`);
                        ctx.fillStyle = pollenBody;
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);

                        // 花粉高光點
                        ctx.beginPath();

                    }
                } else if (bodyClass === 'theme-starry') {
                    // 星空主題：星河效果

                // 彩虹主題不需要額外裝飾，六色漸變背景已足夠

                // 5. 下載圖片
                const link = document.createElement('a');
                // 取得當下時間
const now = new Date();

// 提取並格式化日期 (padStart 確保月份和日期都是兩位數，例如 4月變成 04)
const year = now.getFullYear();
const month = String(now.getMonth() + 1).padStart(2, '0'); // 月份是從 0 開始的，所以要 +1
const day = String(now.getDate()).padStart(2, '0');
const hours = String(now.getHours()).padStart(2, '0');
const minutes = String(now.getMinutes()).padStart(2, '0');

// 組合出乾淨的西曆日期字串，例如 "20260425_1430"
const formattedDate = `${year}${month}${day}_${hours}${minutes}`;

// 設定下載檔名
link.download = `StarDiary_${formattedDate}.png`;

                link.href = canvas.toDataURL('image/png');

        // ===== History Panel Logic =====
        const HISTORY_KEY = 'stardiary-history';
        const MAX_HISTORY_ITEMS = 50;

        function getHistory() {
            if (!storage) return [];
            try {
                const data = storage.getItem(HISTORY_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        function saveHistory(historyArr) {
            if (!storage) return;
            try {
                storage.setItem(HISTORY_KEY, JSON.stringify(historyArr));
            } catch (e) {
                // Silent fail
            }
        }

        function saveToHistory() {
            const prompt = document.getElementById('question-text')?.innerText || '';
            const category = document.getElementById('category-badge')?.innerText || '';
            const content = document.getElementById('answer-editor')?.innerText || '';

            if (!prompt || prompt === '點擊「抽取題目」開始' || !content) return;

            const historyItem = {
                id: Date.now(),
                prompt: prompt,
                category: category,
                content: content,
                contentHtml: document.getElementById('answer-editor')?.innerHTML || '',
                theme: currentThemeName,
                ratio: currentRatio,
                font: currentFont,
                date: {
                    year: document.getElementById('date-year')?.value || new Date().getFullYear(),
                    month: document.getElementById('date-month')?.value || new Date().getMonth() + 1,
                    day: document.getElementById('date-day')?.value || new Date().getDate()
                },
                dateVisible: dateVisible,
                savedAt: new Date().toISOString()
            };

            const history = getHistory();
            history.unshift(historyItem);

            // Keep only the latest MAX_HISTORY_ITEMS
            if (history.length > MAX_HISTORY_ITEMS) {
                history.length = MAX_HISTORY_ITEMS;
            }

            saveHistory(history);
        }

        function openHistoryPanel() {
            SoundFX.playHistory(); // 播放開啟歷史記錄音效
            const overlay = document.getElementById('history-panel-overlay');
            overlay.classList.add('active');
            renderHistoryList();
            document.body.style.overflow = 'hidden';
        }

        function closeHistoryPanel(event) {
            if (event && event.target !== event.currentTarget) return;
            const overlay = document.getElementById('history-panel-overlay');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        function renderHistoryList() {
            const listEl = document.getElementById('history-list');
            const countEl = document.getElementById('history-count');
            const footerEl = document.getElementById('history-footer');
            const history = getHistory();

            countEl.textContent = history.length > 0 ? `(${history.length})` : '';
            footerEl.style.display = history.length > 0 ? 'flex' : 'none';

            if (history.length === 0) {
                listEl.innerHTML = `
                    <div class="history-empty">

        function confirmDate() {
            const today = new Date();
            const currentYear = today.getFullYear();
            const currentMonth = today.getMonth() + 1;
            const currentDay = today.getDate();

            const yearInput = document.getElementById('date-year');
            const monthInput = document.getElementById('date-month');
            const dayInput = document.getElementById('date-day');

            // Parse and sanitize inputs
            let year = parseInt(yearInput.value);
            let month = parseInt(monthInput.value);
            let day = parseInt(dayInput.value);

            // Handle invalid/empty inputs with defaults
            if (isNaN(year) || year < 1600) {
                year = currentYear;
                yearInput.value = year;
            }
            if (isNaN(month) || month < 1 || month > 12) {
                month = 1;
                monthInput.value = month;
            }
            if (isNaN(day) || day < 1) {
                day = 1;
                dayInput.value = day;
            }

            // Clamp year to valid range (1600 to current year)
            year = Math.min(Math.max(1600, year), currentYear);
            yearInput.value = year;

            // If year is current year, limit month to current month or earlier
            if (year === currentYear && month > currentMonth) {
                month = currentMonth;
                monthInput.value = month;
            }

            // Calculate max day for the selected month
            const maxDay = new Date(year, month, 0).getDate();
            day = Math.min(Math.max(1, day), maxDay);

            // If year and month are current, limit day to today or earlier
            if (year === currentYear && month === currentMonth && day > currentDay) {
                day = currentDay;
            }
            dayInput.value = day;

            selectedDate = new Date(year, month - 1, day);
            updateDateDisplay();
            closeDatePicker();
            debouncedSaveDraft();
        }

        const bgCanvas = document.getElementById('bgCanvas');
