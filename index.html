        // 彩虹色彩流動系統
        let rainbowOffset = 0;
        function animateRainbow() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

            // 流動彩虹光帶
            const colors = [
                'rgba(255, 154, 158, 0.3)',
                'rgba(250, 208, 196, 0.3)',
                'rgba(255, 236, 210, 0.3)',
                'rgba(161, 196, 253, 0.3)',
                'rgba(194, 233, 251, 0.3)',
                'rgba(212, 252, 121, 0.3)'
            ];

            // 繪製多條流動的光帶
            for (let i = 0; i < 5; i++) {
                const yBase = (h * 0.15) + (i * h * 0.2);
                const waveOffset = rainbowOffset + i * 0.5;

                ctx = bgCtx;
                ctx.beginPath();
                ctx.moveTo(0, yBase + Math.sin(waveOffset) * 30);

                for (let x = 0; x <= w; x += 10) {
                    const y = yBase + Math.sin((x * 0.005) + waveOffset) * 40 + Math.sin((x * 0.003) + waveOffset * 0.7) * 20;
                    ctx.lineTo(x, y);
                }

                ctx.lineTo(w, h);
                ctx.lineTo(0, h);
                ctx.closePath();

                const gradient = ctx.createLinearGradient(0, yBase - 50, w, yBase + 50);
                const colorIndex = i % colors.length;
                gradient.addColorStop(0, colors[colorIndex]);
                gradient.addColorStop(0.5, colors[(colorIndex + 1) % colors.length]);
                gradient.addColorStop(1, colors[(colorIndex + 2) % colors.length]);
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            // 添加流動光點
            for (let i = 0; i < 20; i++) {
                const x = ((rainbowOffset * 50 + i * 80) % (w + 100)) - 50;
                const y = (h * 0.2) + (i % 5) * (h * 0.18) + Math.sin(rainbowOffset + i) * 30;
                const size = 3 + Math.sin(rainbowOffset * 2 + i) * 2;
                const opacity = 0.3 + Math.sin(rainbowOffset + i * 0.5) * 0.2;

                const gradient = bgCtx.createRadialGradient(x, y, 0, x, y, size * 3);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${opacity})`);
                gradient.addColorStop(1, 'transparent');
                bgCtx.fillStyle = gradient;
                bgCtx.beginPath();
                bgCtx.arc(x, y, size * 3, 0, Math.PI * 2);
                bgCtx.fill();
            }

            rainbowOffset += 0.015;

            if (currentThemeName === 'rainbow') {
                animationId = requestAnimationFrame(animateRainbow);
            }
        }

        // 四葉草呼吸動畫系統（不重疊配置）+ 露珠光點
        let cloverParticles = [];
        let cloverDewDrops = []; // 露珠光點
        let cloverAnimTime = 0; // 動畫時間
        
        function initCloverParticles() {
            cloverParticles = [];
            cloverDewDrops = [];
            const w = window.innerWidth;
            const h = window.innerHeight;
            const placedItems = []; // 已放置的四葉草位置
            const configs = [
                { count: 5, minSize: 40, maxSize: 55, baseOpacity: 0.28 },
                { count: 6, minSize: 25, maxSize: 40, baseOpacity: 0.22 },
                { count: 8, minSize: 12, maxSize: 25, baseOpacity: 0.16 }
            ];
            configs.forEach(config => {
                for (let i = 0; i < config.count; i++) {
                    let x, y, size, attempts = 0;
                    do {
                        x = Math.random() * w;
                        y = Math.random() * h;
                        size = Math.random() * (config.maxSize - config.minSize) + config.minSize;
                        attempts++;
                    } while (attempts < 50 && placedItems.some(p => Math.hypot(p.x - x, p.y - y) < (p.size + size) * 1.2));
                    if (attempts < 50) {
                        placedItems.push({ x, y, size });
                        cloverParticles.push({
                            x: x,
                            y: y,
                            size: size,
                            baseOpacity: config.baseOpacity,
                            phase: Math.random() * Math.PI * 2,
                            breathSpeed: Math.random() * 0.015 + 0.008,
                            fadeState: Math.random() > 0.3 ? 'visible' : 'fading',
                            fadeProgress: Math.random(),
                            nextFadeTime: Date.now() + Math.random() * 8000 + 4000
                        });
                    }
                }
            });

            // 初始化露珠光點（晨露般閃爍效果）
            const dewCount = Math.floor(w * h / 12000); // 根據螢幕大小調整數量
             for (let i = 0; i < dewCount; i++) {
                 cloverDewDrops.push({
                     x: Math.random() * w,
                     y: Math.random() * h,
                     size: Math.random() * 3 + 1.5,
                     phase: Math.random() * Math.PI * 2,
                     twinkleSpeed: Math.random() * 0.04 + 0.02,
                     brightness: Math.random() * 0.5 + 0.5
                 });
             }
        }

        function drawAnimatedClover(ctx, p) {
            // 呼吸效果
            const breathe = 0.6 + 0.4 * Math.sin(p.phase);
            let opacity = p.baseOpacity * breathe;

            // Dim in/out 效果
            const now = Date.now();
            if (p.fadeState === 'fading') {
                p.fadeProgress -= 0.008;
                if (p.fadeProgress <= 0) {
                    p.fadeProgress = 0;
                    p.fadeState = 'hidden';
                    p.nextFadeTime = now + Math.random() * 3000 + 1000;
                }
            } else if (p.fadeState === 'hidden' && now > p.nextFadeTime) {
                p.fadeState = 'appearing';
            } else if (p.fadeState === 'appearing') {
                p.fadeProgress += 0.012;
                if (p.fadeProgress >= 1) {
                    p.fadeProgress = 1;
                    p.fadeState = 'visible';
                    p.nextFadeTime = now + Math.random() * 10000 + 5000;
                }
            } else if (p.fadeState === 'visible' && now > p.nextFadeTime) {
                p.fadeState = 'fading';
            }

            opacity *= p.fadeProgress;
            if (opacity < 0.01) return;

            ctx.save();
            ctx.translate(p.x, p.y);
            // 柔和陰影
            ctx.shadowColor = `rgba(30, 80, 30, ${opacity * 0.5})`;
            ctx.shadowBlur = p.size * 0.12;
            ctx.shadowOffsetX = p.size * 0.04;
            ctx.shadowOffsetY = p.size * 0.06;

            // 繪製4片心形葉子
            for (let i = 0; i < 4; i++) {
                // 漸層效果
                const gradient = ctx.createRadialGradient(0, -p.size * 0.3, 0, 0, -p.size * 0.3, p.size * 0.6);
                gradient.addColorStop(0, `rgba(76, 175, 80, ${opacity})`);
                gradient.addColorStop(0.5, `rgba(46, 125, 50, ${opacity})`);
                gradient.addColorStop(1, `rgba(27, 94, 32, ${opacity * 0.8})`);
                ctx.fillStyle = gradient;

                // 心形葉子路徑
                ctx.beginPath();
                const ly = -p.size * 0.35;
                const w = p.size * 0.4;
                const h = p.size * 0.55;
                ctx.moveTo(0, ly - h * 0.3);
                ctx.bezierCurveTo(-w * 0.8, ly - h * 0.9, -w * 1.1, ly - h * 0.1, 0, ly + h * 0.5);
                ctx.bezierCurveTo(w * 1.1, ly - h * 0.1, w * 0.8, ly - h * 0.9, 0, ly - h * 0.3);
                ctx.closePath();
                ctx.fill();

                // 葉脈高光
                ctx.strokeStyle = `rgba(255, 255, 255, ${opacity * 0.2})`;
                ctx.lineWidth = p.size * 0.015;
                ctx.beginPath();
                ctx.moveTo(0, -p.size * 0.15);
                ctx.lineTo(0, -p.size * 0.45);
                ctx.stroke();

                ctx.rotate(Math.PI / 2);
            }
            // 中心點
            ctx.shadowColor = 'transparent';
            ctx.beginPath();
            ctx.arc(0, 0, p.size * 0.05, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(56, 142, 60, ${opacity * 0.8})`;
            ctx.fill();
            
            ctx.restore();
        }

        function animateClovers() {
            const w = bgCanvas.width;
            const h = bgCanvas.height;
             bgCtx.clearRect(0, 0, w, h);
 
             cloverAnimTime += 0.016;

             // === 頂部森林光暈穿透效果（動態） ===
             const lightPulse = 0.7 + 0.3 * Math.sin(cloverAnimTime * 0.5);

             // 主要柔和光暈
             const forestGlow = bgCtx.createRadialGradient(w * 0.5, 0, 0, w * 0.5, 0, h * 0.6);
             forestGlow.addColorStop(0, `rgba(255, 255, 220, ${0.25 * lightPulse})`);
             forestGlow.addColorStop(0.3, `rgba(220, 255, 200, ${0.15 * lightPulse})`);
             forestGlow.addColorStop(0.6, `rgba(180, 230, 160, ${0.08 * lightPulse})`);
             forestGlow.addColorStop(1, 'transparent');
             bgCtx.fillStyle = forestGlow;
             bgCtx.fillRect(0, 0, w, h * 0.7);
 
             // 左側光線穿透
             const leftGlow = bgCtx.createRadialGradient(w * 0.2, 0, 0, w * 0.2, 0, h * 0.5);
             leftGlow.addColorStop(0, `rgba(255, 255, 200, ${0.18 * lightPulse})`);
             leftGlow.addColorStop(0.5, `rgba(200, 240, 180, ${0.08 * lightPulse})`);
             leftGlow.addColorStop(1, 'transparent');
             bgCtx.fillStyle = leftGlow;
             bgCtx.fillRect(0, 0, w * 0.5, h * 0.6);
 
             // 右側光線穿透
             const rightGlow = bgCtx.createRadialGradient(w * 0.8, 0, 0, w * 0.8, 0, h * 0.45);
             rightGlow.addColorStop(0, `rgba(255, 255, 210, ${0.15 * lightPulse})`);
             rightGlow.addColorStop(0.5, `rgba(200, 235, 175, ${0.06 * lightPulse})`);
             rightGlow.addColorStop(1, 'transparent');
             bgCtx.fillStyle = rightGlow;
             bgCtx.fillRect(w * 0.5, 0, w * 0.5, h * 0.55);
 
             // === 繪製四葉草 ===
            cloverParticles.forEach(p => {
                p.phase += p.breathSpeed;
                drawAnimatedClover(bgCtx, p);
            });

            // === 露珠光點效果 晨露閃爍） ===
            cloverDewDrops.forEach(drop => {
                drop.phase += drop.twinkleSpeed;
                const twinkle = 0.3 + 0.7 * Math.pow(Math.sin(drop.phase), 2);
                const opacity = twinkle * drop.brightness * 0.6;

                if (opacity > 0.1) {
                    // 露珠光暈
                    const dewGradient = bgCtx.createRadialGradient(
                        drop.x, drop.y, 0,
                        drop.x, drop.y, drop.size * 4
                    );
                    dewGradient.addColorStop(0, `rgba(255, 255, 255, ${opacity})`);
                    dewGradient.addColorStop(0.3, `rgba(220, 255, 240, ${opacity * 0.6})`);
                    dewGradient.addColorStop(0.6, `rgba(180, 240, 220, ${opacity * 0.25})`);
                    dewGradient.addColorStop(1, 'transparent');

                    bgCtx.fillStyle = dewGradient;
                    bgCtx.beginPath();
                    bgCtx.arc(drop.x, drop.y, drop.size * 4, 0, Math.PI * 2);
                    bgCtx.fill();

                    // 露珠核心亮點
                    bgCtx.beginPath();
                    bgCtx.arc(drop.x, drop.y, drop.size * 0.6, 0, Math.PI * 2);
                    bgCtx.fillStyle = `rgba(255, 255, 255, ${opacity * 1.2})`;
                    bgCtx.fill();
                }
            });

            if (currentThemeName === 'clover') {
                animationId = requestAnimationFrame(animateClovers);
            }
        }

        // 向日葵呼吸動畫系統（不重疊配置）+ 金色花粉粒子
        let sunflowerParticles = [];
        let goldenPollenParticles = []; // 金色花粉粒子
        let sunlightTime = 0; // 日照動畫時間
        let sunlightEffectMode = 'tyndall'; // 交替模式：'tyndall' 或 'radial'
        let sunlightModeTransition = 0; // 過渡動畫進度 (0-1)
        let sunlightModeDuration = 6000; // 每個模式持續時間 (ms)
        let lastSunlightModeSwitch = Date.now();

        function initSunflowerParticles() {
            sunflowerParticles = [];
            goldenPollenParticles = [];
            const w = window.innerWidth;
            const h = window.innerHeight;
            const placedItems = []; // 已放置的向日葵位置
            const isMobile = w < 768;

            // 手機上限制數量：大向日葵最多3個，小向日葵最多9個
            const configs = isMobile ? [
                { count: 3, minSize: 70, maxSize: 100, petalOpacity: 0.30, centerOpacity: 0.95 },  // 大：最多3個
                { count: 4, minSize: 45, maxSize: 70, petalOpacity: 0.25, centerOpacity: 0.92 },   // 中
                { count: 5, minSize: 25, maxSize: 45, petalOpacity: 0.20, centerOpacity: 0.90 },   // 小：合計不超過9
                { count: 4, minSize: 12, maxSize: 25, petalOpacity: 0.15, centerOpacity: 0.88 }    // 迷你
            ] : [
                { count: 3, minSize: 70, maxSize: 100, petalOpacity: 0.30, centerOpacity: 0.95 },
                { count: 5, minSize: 45, maxSize: 70, petalOpacity: 0.25, centerOpacity: 0.92 },
                { count: 8, minSize: 25, maxSize: 45, petalOpacity: 0.20, centerOpacity: 0.90 },
                { count: 12, minSize: 12, maxSize: 25, petalOpacity: 0.15, centerOpacity: 0.88 }
            ];

            configs.forEach(config => {
                for (let i = 0; i < config.count; i++) {
                    let x, y, size, attempts = 0;
                    do {
                        x = Math.random() * w;
                        y = Math.random() * h;
                        size = Math.random() * (config.maxSize - config.minSize) + config.minSize;
                        attempts++;
                    } while (attempts < 50 && placedItems.some(p => Math.hypot(p.x - x, p.y - y) < (p.size + size) * 1.2));
                    if (attempts < 50) {
                        placedItems.push({ x, y, size });
                        sunflowerParticles.push({
                            x: x,
                            y: y,
                            size: size,
                            petalOpacity: config.petalOpacity,
                            centerOpacity: config.centerOpacity,
                            phase: Math.random() * Math.PI * 2,
                            breathSpeed: Math.random() * 0.015 + 0.006,
                            rotation: Math.random() * Math.PI * 2,
                            rotationSpeed: (Math.random() - 0.5) * 0.004,
                            fadeState: Math.random() > 0.3 ? 'visible' : 'fading',
                            fadeProgress: Math.random(),
                            nextFadeTime: Date.now() + Math.random() * 8000 + 4000
                        });
                    }
                }
            });

            // 初始化金色花粉粒子（極細小金沙
             const pollenCount = isMobile ? 40 : 70;
             for (let i = 0; i < pollenCount; i++) {
                 goldenPollenParticles.push({
                     x: Math.random() * w * 1.2,
                     y: Math.random() * h,
                     size: Math.random() * 2 + 0.5, // 極細小
                     speedX: -(Math.random() * 0.3 + 0.1), // 向左緩慢飄動
                     speedY: Math.random() * 0.2 + 0.05, // 緩慢下落
                     shimmer: Math.random() * Math.PI * 2,                     shimmerSpeed: Math.random() * 0.05 + 0.02,
                     brightness: Math.random() * 0.5 + 0.5
                 });
             }
        }

        function drawAnimatedSunflower(ctx, p) {
            // 呼吸效果
            const breathe = 0.6 + 0.4 * Math.sin(p.phase);
            let opacityMult = breathe;

            // Dim in/out 效果
            const now = Date.now();
            if (p.fadeState === 'fading') {
                p.fadeProgress -= 0.006;
                if (p.fadeProgress <= 0) {
                    p.fadeProgress = 0;
                    p.fadeState = 'hidden';
                    p.nextFadeTime = now + Math.random() * 3000 + 1500;
                }
            } else if (p.fadeState === 'hidden' && now > p.nextFadeTime) {
                p.fadeState = 'appearing';
            } else if (p.fadeState === 'appearing') {
                p.fadeProgress += 0.01;
                if (p.fadeProgress >= 1) {
                    p.fadeProgress = 1;
                    p.fadeState = 'visible';
                    p.nextFadeTime = now + Math.random() * 12000 + 6000;
                }
            } else if (p.fadeState === 'visible' && now > p.nextFadeTime) {
                p.fadeState = 'fading';
            }

            opacityMult *= p.fadeProgress;
            if (opacityMult < 0.01) return;

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);

            const petalAlpha = p.petalOpacity * opacityMult;
             const centerAlpha = p.centerOpacity * opacityMult;
 
             // 柔和金色光暈
             if (p.size > 30) {
                 const glowGradient = ctx.createRadialGradient(0, 0, p.size * 0.3, 0, 0, p.size * 1.2);
                 glowGradient.addColorStop(0, `rgba(255, 220, 100, ${petalAlpha * 0.3})`);
                 glowGradient.addColorStop(0.5, `rgba(255, 200, 80, ${petalAlpha * 0.15})`);
                glowGradient.addColorStop(1,`rgba(255, 200, 50, 0)`);
                 ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, p.size * 1.2, 0, Math.PI * 2);
                ctx.fill();
            }
            // 花瓣（尖端變窄，金黃到橙色漸層）
             const petalCount = 14;
             for (let i = 0; i < petalCount; i++) {
                 ctx.save();
                 ctx.rotate((i / petalCount) * Math.PI * 2);
 
                 // 花瓣漸層
                 const petalGradient = ctx.createLinearGradient(0, -p.size * 0.35, 0, -p.size * 0.85);
                 petalGradient.addColorStop(0, `rgba(255, 193, 7, ${petalAlpha})`);
                 petalGradient.addColorStop(0.4, `rgba(255, 167, 38, ${petalAlpha})`);
                 petalGradient.addColorStop(0.7, `rgba(255, 152, 0, ${petalAlpha})`);
                 petalGradient.addColorStop(1, `rgba(255, 111, 0, ${petalAlpha * 0.9})`);
                 ctx.fillStyle = petalGradient;
 

                 // 尖端變窄的花瓣形狀
                 ctx.beginPath();
                 const baseWidth = p.size * 0.13;
                 const tipWidth = p.size * 0.04;
                 ctx.moveTo(-baseWidth, -p.size * 0.32);
                 ctx.bezierCurveTo(-baseWidth * 1.2, -p.size * 0.5, -tipWidth * 2, -p.size * 0.75, 0, -p.size * 0.85);
                 ctx.bezierCurveTo(tipWidth * 2, -p.size * 0.75, baseWidth * 1.2, -p.size * 0.5, baseWidth, -p.size * 0.32);
                 ctx.closePath();
                 ctx.fill();
 
                 ctx.restore();
             }

             // 花心漸層
             const centerGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, p.size * 0.35);
             centerGradient.addColorStop(0, `rgba(90, 60, 40, ${centerAlpha})`);
             centerGradient.addColorStop(0.5, `rgba(121, 85, 72, ${centerAlpha})`);
             centerGradient.addColorStop(0.85, `rgba(78, 52, 46, ${centerAlpha})`);
             centerGradient.addColorStop(1, `rgba(62, 39, 35, ${centerAlpha})`);
            
            ctx.beginPath();
            ctx.arc(0, 0, p.size * 0.35, 0, Math.PI * 2);
            ctx.fillStyle = centerGradient;
            ctx.fill();
            
            // 籽粒紋理（螺旋排列）
            if (p.size > 25) {
                const seedCount = Math.min(Math.floor(p.size * 0.6), 40);
                const goldenAngle = Math.PI * (3 - Math.sqrt(5));

                for (let i = 1; i <= seedCount; i++) {
                    const angle = i * goldenAngle;
                    const radius = Math.sqrt(i / seedCount) * p.size * 0.28;
                    const seedX = Math.cos(angle) * radius;
                    const seedY = Math.sin(angle) * radius;
                    const seedSize = (p.size * 0.02) * (1 - (radius / (p.size * 0.35)) * 0.3);

                    ctx.beginPath();
                    ctx.arc(seedX, seedY, seedSize, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(50, 35, 25, ${centerAlpha * 0.6})`;
                    ctx.fill();
                }
            }
            ctx.restore();
        }

        function animateSunflowers() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

            sunlightTime += 0.008;

            // === 交替模式控制 ===
            const now = Date.now();
            const timeSinceSwitch = now - lastSunlightModeSwitch;

            // 檢查是否需要切換模式
            if (timeSinceSwitch > sunlightModeDuration) {
                sunlightEffectMode = sunlightEffectMode === 'tyndall' ? 'radial' : 'tyndall';
                lastSunlightModeSwitch = now;
                sunlightModeTransition = 0;
            }

            // 平滑過渡動畫 (1.5秒淡入淡出)
            const transitionDuration = 1500;
            if (timeSinceSwitch < transitionDuration) {
                sunlightModeTransition = timeSinceSwitch / transitionDuration;
            } else if (timeSinceSwitch > sunlightModeDuration - transitionDuration) {
                sunlightModeTransition = (sunlightModeDuration - timeSinceSwitch) / transitionDuration;
            } else {
                sunlightModeTransition = 1;
            }

            // 緩動函數
            const easeInOut = t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
            const effectOpacity = easeInOut(Math.max(0, Math.min(1, sunlightModeTransition)));

            // 主光源位置（右上角，隨時間微微擺動）
            const sunX = w * 0.85 + Math.sin(sunlightTime * 0.3) * 30;
            const sunY = -h * 0.1 + Math.cos(sunlightTime * 0.2) * 20;

            if (sunlightEffectMode === 'tyndall') {
                // === 丁達爾效應日照動畫 ===

                // 深色背景覆蓋層 - 讓光柱更清晰可見
                const darkOverlay = bgCtx.createLinearGradient(0, 0, w, h);
                const darkOpacity = 0.45 * effectOpacity;
                darkOverlay.addColorStop(0, `rgba(100, 80, 30, ${darkOpacity * 0.4})`);
                darkOverlay.addColorStop(0.25, `rgba(80, 62, 22, ${darkOpacity * 0.6})`);
                darkOverlay.addColorStop(0.5, `rgba(65, 50, 18, ${darkOpacity * 0.8})`);
                darkOverlay.addColorStop(0.75, `rgba(55, 42, 15, ${darkOpacity * 0.9})`);
                darkOverlay.addColorStop(1, `rgba(48, 36, 12, ${darkOpacity})`);
                bgCtx.fillStyle = darkOverlay;
                bgCtx.fillRect(0, 0, w, h);

                // 大範圍柔和陽光蔓延效果（增強亮度以對比深色背景）
                const sunGlow = bgCtx.createRadialGradient(sunX, sunY, 0, sunX, sunY, h * 1.2);
                const glowPulse = (0.3 + 0.1 * Math.sin(sunlightTime * 0.5)) * effectOpacity;
                sunGlow.addColorStop(0, `rgba(255, 252, 215, ${glowPulse * 2.2})`);
                sunGlow.addColorStop(0.15, `rgba(255, 248, 195, ${glowPulse * 1.6})`);
                sunGlow.addColorStop(0.4, `rgba(255, 240, 165, ${glowPulse * 0.9})`);
                sunGlow.addColorStop(0.7, `rgba(255, 235, 140, ${glowPulse * 0.4})`);
                sunGlow.addColorStop(1, 'rgba(255, 230, 120, 0)');
                bgCtx.fillStyle = sunGlow;
                bgCtx.fillRect(0, 0, w, h);

                // 丁達爾光束效果 - 多條對角光線（增強光束亮度和對比）
                const beamCount = 5;
                for (let i = 0; i < beamCount; i++) {
                    const beamPhase = sunlightTime * 0.3 + i * 0.8;
                    const beamOpacity = (0.12 + 0.08 * Math.sin(beamPhase)) * effectOpacity;
                    const beamWidth = 80 + 40 * Math.sin(beamPhase * 0.7);

                    // 光束起始角度（從右上角向左下角）
                    const angle = -Math.PI * 0.7 + (i - beamCount / 2) * 0.12;
                    const beamLength = Math.max(w, h) * 1.5;

                    // 繪製漸變光束
                    bgCtx.save();
                    bgCtx.translate(sunX, sunY);
                    bgCtx.rotate(angle);

                    const beamGradient = bgCtx.createLinearGradient(0, 0, beamLength, 0);
                    beamGradient.addColorStop(0, `rgba(255, 255, 235, ${beamOpacity * 2})`);
                    beamGradient.addColorStop(0.2, `rgba(255, 252, 215, ${beamOpacity * 1.5})`);
                    beamGradient.addColorStop(0.5, `rgba(255, 248, 195, ${beamOpacity * 0.8})`);
                    beamGradient.addColorStop(0.8, `rgba(255, 242, 170, ${beamOpacity * 0.3})`);
                    beamGradient.addColorStop(1, 'rgba(255, 235, 150, 0)');

                    bgCtx.fillStyle = beamGradient;
                    bgCtx.beginPath();
                    bgCtx.moveTo(0, -beamWidth * 0.3);
                    bgCtx.lineTo(beamLength, -beamWidth * 0.3);
                    bgCtx.lineTo(beamLength, beamWidth * 0.3);
                    bgCtx.lineTo(0, beamWidth * 0.3);
                    bgCtx.closePath();
                    bgCtx.fill();

                    bgCtx.restore();
                }

                // 懸浮塵埃微粒（丁達爾散射效果 - 增強亮度）
                for (let i = 0; i < 35; i++) {
                    const dustPhase = sunlightTime * 0.5 + i * 0.7;
                    const dustX = (sunX * 0.3 + (i * 47) % w + Math.sin(dustPhase) * 20) % w;
                    const dustY = (h * 0.1 + (i * 73) % (h * 0.8) + Math.cos(dustPhase * 0.8) * 15);
                    const dustSize = 2.5 + Math.sin(dustPhase) * 1.5;
                    const dustOpacity = (0.3 + 0.2 * Math.sin(dustPhase * 1.5)) * effectOpacity;

                    const dustGlow = bgCtx.createRadialGradient(dustX, dustY, 0, dustX, dustY, dustSize * 5);
                    dustGlow.addColorStop(0, `rgba(255, 255, 245, ${dustOpacity})`);
                    dustGlow.addColorStop(0.3, `rgba(255, 252, 225, ${dustOpacity * 0.6})`);
                    dustGlow.addColorStop(0.6, `rgba(255, 248, 200, ${dustOpacity * 0.3})`);
                    dustGlow.addColorStop(1, 'rgba(255, 242, 175, 0)');
                    bgCtx.fillStyle = dustGlow;
                    bgCtx.beginPath();
                    bgCtx.arc(dustX, dustY, dustSize * 5, 0, Math.PI * 2);
                    bgCtx.fill();
                }
            } else {
                // === 大範圍放射狀陽光動畫 ===

                // 中心放射陽光（從畫面中央偏上發出）
                const centerX = w * 0.5;
                const centerY = h * 0.15;

                // 大範圍放射光暈
                const radialGlow = bgCtx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(w, h) * 0.9);
                const glowPulse = (0.2 + 0.08 * Math.sin(sunlightTime * 0.4)) * effectOpacity;
                radialGlow.addColorStop(0, `rgba(255, 250, 200, ${glowPulse * 1.2})`);
                radialGlow.addColorStop(0.15, `rgba(255, 245, 180, ${glowPulse})`);
                radialGlow.addColorStop(0.4, `rgba(255, 238, 150, ${glowPulse * 0.5})`);
                radialGlow.addColorStop(0.7, `rgba(255, 230, 120, ${glowPulse * 0.2})`);
                radialGlow.addColorStop(1, 'rgba(255, 225, 100, 0)');
                bgCtx.fillStyle = radialGlow;
                bgCtx.fillRect(0, 0, w, h);

                // 放射光芒（從中心向外擴散）
                const rayCount = 12;
                for (let i = 0; i < rayCount; i++) {
                    const rayPhase = sunlightTime * 0.2 + i * 0.5;
                    const rayOpacity = (0.08 + 0.05 * Math.sin(rayPhase)) * effectOpacity;
                    const rayWidth = 60 + 30 * Math.sin(rayPhase * 0.6);

                    // 均勻分布的放射角度
                    const baseAngle = (i / rayCount) * Math.PI * 2;
                    const angle = baseAngle + Math.sin(sunlightTime * 0.15 + i * 0.3) * 0.05;
                    const rayLength = Math.max(w, h) * 1.2;

                    bgCtx.save();
                    bgCtx.translate(centerX, centerY);
                    bgCtx.rotate(angle);

                    const rayGradient = bgCtx.createLinearGradient(0, 0, rayLength, 0);
                    rayGradient.addColorStop(0, `rgba(255, 252, 230, ${rayOpacity * 1.3})`);
                    rayGradient.addColorStop(0.2, `rgba(255, 248, 200, ${rayOpacity})`);
                    rayGradient.addColorStop(0.5, `rgba(255, 242, 170, ${rayOpacity * 0.5})`);
                    rayGradient.addColorStop(1, 'rgba(255, 235, 140, 0)');

                    bgCtx.fillStyle = rayGradient;
                    bgCtx.beginPath();
                    bgCtx.moveTo(0, -rayWidth * 0.15);
                    bgCtx.lineTo(rayLength, -rayWidth * 0.6);
                    bgCtx.lineTo(rayLength, rayWidth * 0.6);
                    bgCtx.lineTo(0, rayWidth * 0.15);
                    bgCtx.closePath();
                    bgCtx.fill();

                    bgCtx.restore();
                }

                // 中央光源高亮點
                const coreGlow = bgCtx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 80);
                const corePulse = (0.6 + 0.3 * Math.sin(sunlightTime * 0.6)) * effectOpacity;
                coreGlow.addColorStop(0, `rgba(255, 255, 240, ${corePulse})`);
                coreGlow.addColorStop(0.3, `rgba(255, 250, 200, ${corePulse * 0.7})`);
                coreGlow.addColorStop(0.7, `rgba(255, 245, 160, ${corePulse * 0.3})`);
                coreGlow.addColorStop(1, 'rgba(255, 240, 120, 0)');
                bgCtx.fillStyle = coreGlow;
                bgCtx.beginPath();
                bgCtx.arc(centerX, centerY, 80, 0, Math.PI * 2);
                bgCtx.fill();

                // 閃亮光點
                for (let i = 0; i < 20; i++) {
                    const sparklePhase = sunlightTime * 0.8 + i * 1.2;
                    const distance = 100 + (i * 37) % (Math.min(w, h) * 0.4);
                    const sparkleAngle = (i / 20) * Math.PI * 2 + sunlightTime * 0.05;
                    const sparkleX = centerX + Math.cos(sparkleAngle) * distance;
                    const sparkleY = centerY + Math.sin(sparkleAngle) * distance;
                    const sparkleSize = 2 + Math.sin(sparklePhase) * 1.5;
                    const sparkleOpacity = (0.2 + 0.15 * Math.sin(sparklePhase * 1.5)) * effectOpacity;

                    const sparkleGlow = bgCtx.createRadialGradient(sparkleX, sparkleY, 0, sparkleX, sparkleY, sparkleSize * 5);
                    sparkleGlow.addColorStop(0, `rgba(255, 255, 230, ${sparkleOpacity})`);
                    sparkleGlow.addColorStop(0.4, `rgba(255, 250, 200, ${sparkleOpacity * 0.5})`);
                    sparkleGlow.addColorStop(1, 'rgba(255, 245, 170, 0)');
                    bgCtx.fillStyle = sparkleGlow;
                    bgCtx.beginPath();
                    bgCtx.arc(sparkleX, sparkleY, sparkleSize * 5, 0, Math.PI * 2);
                    bgCtx.fill();
                }
            }

            // === 向日葵裝飾 ===
            sunflowerParticles.forEach(p => {
                p.phase += p.breathSpeed;
                p.rotation += p.rotationSpeed;
                drawAnimatedSunflower(bgCtx, p);
            });

            // === 金色花粉粒子（飄落的金沙效果）===
             goldenPollenParticles.forEach(pollen => {
                 // 更新位置                 pollen.x += pollen.speedX;
                 pollen.y += pollen.speedY;
                 pollen.shimmer += pollen.shimmerSpeed;
 
                 // 循環重置
                 if (pollen.x < -10 || pollen.y > h + 10) {
                     pollen.x = w + Math.random() * 50;
                     pollen.y = Math.random() * h * 0.3;
                 }

                 // 閃爍效果
                 const shimmerOpacity = pollen.brightness * (0.4 + 0.6 * Math.pow(Math.sin(pollen.shimmer), 2));
 
                 if (shimmerOpacity > 0.15) {
                     // 金色花粉光暈
                     const pollenGlow = bgCtx.createRadialGradient(
                         pollen.x, pollen.y, 0,
                         pollen.x, pollen.y, pollen.size * 3
                         );
                     pollenGlow.addColorStop(0, `rgba(255, 215, 0, ${shimmerOpacity})`);
                     pollenGlow.addColorStop(0.4, `rgba(255, 193, 7, ${shimmerOpacity * 0.5})`);
                     pollenGlow.addColorStop(1, `rgba(255, 200, 50, 0)`);
 
                     bgCtx.fillStyle = pollenGlow;
                     bgCtx.beginPath();
                     bgCtx.arc(pollen.x, pollen.y, pollen.size * 3, 0, Math.PI * 2);
                     bgCtx.fill();
 
                     // 核心亮點
                     bgCtx.beginPath();
                     bgCtx.arc(pollen.x, pollen.y, pollen.size * 0.5, 0, Math.PI * 2);
                           bgCtx.fillStyle = `rgba(255, 245, 200, ${shimmerOpacity * 1.2})`;
                           bgCtx.fill();
                    }
             });
            if (currentThemeName === 'sunflower') {
                animationId = requestAnimationFrame(animateSunflowers);
            }
        }

        // 金色流沙粒子系統
        let goldParticles = [];
        function initGoldParticles() {
            goldParticles = [];
            const w = window.innerWidth;
            const h = window.innerHeight;
            // 創建多層金沙粒子
            for (let i = 0; i < 120; i++) {
                goldParticles.push({
                    x: Math.random() * w * 1.5,
                    y: Math.random() * h,
                    size: Math.random() * 4 + 1,
                    speedX: Math.random() * 0.3 + 0.1,
                    speedY: Math.random() * 0.15 + 0.05,
                    opacity: Math.random() * 0.6 + 0.2,
                    shimmer: Math.random() * Math.PI * 2,
                    shimmerSpeed: Math.random() * 0.02 + 0.01,
                    type: 'sand' // 細沙
                });
            }
            // 金箔粒子（較大、更閃亮）
            for (let i = 0; i < 25; i++) {
                goldParticles.push({
                    x: Math.random() * w * 1.5,
                    y: Math.random() * h,
                    size: Math.random() * 8 + 4,
                    speedX: Math.random() * 0.2 + 0.08,
                    speedY: Math.random() * 0.1 + 0.03,
                    opacity: Math.random() * 0.5 + 0.3,
                    shimmer: Math.random() * Math.PI * 2,
                    shimmerSpeed: Math.random() * 0.03 + 0.015,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.01,
                    type: 'foil' // 金箔
                });
            }
        }

        function drawGoldParticle(ctx, p) {
            const shimmerOpacity = p.opacity * (0.6 + 0.4 * Math.sin(p.shimmer));
            if (p.type === 'sand') {
                // 細沙粒子 - 圓形帶光暈
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2);
                gradient.addColorStop(0, `rgba(255, 215, 100, ${shimmerOpacity})`);
                gradient.addColorStop(0.4, `rgba(212, 175, 55, ${shimmerOpacity * 0.6})`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // 金箔 - 不規則形狀帶旋轉
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, p.size);
                gradient.addColorStop(0, `rgba(255, 230, 150, ${shimmerOpacity})`);
                gradient.addColorStop(0.5, `rgba(212, 175, 55, ${shimmerOpacity * 0.8})`);
                gradient.addColorStop(1, `rgba(180, 140, 40, ${shimmerOpacity * 0.3})`);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                // 不規則多邊形
                ctx.moveTo(p.size * 0.8, 0);
                ctx.lineTo(p.size * 0.3, p.size * 0.6);
                ctx.lineTo(-p.size * 0.5, p.size * 0.4);
                ctx.lineTo(-p.size * 0.7, -p.size * 0.2);
                ctx.lineTo(-p.size * 0.2, -p.size * 0.7);
                ctx.lineTo(p.size * 0.4, -p.size * 0.5);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        function animateGoldSand() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

            goldParticles.forEach(p => {
                // 更新位置 - 斜向流動
                p.x -= p.speedX;
                p.y += p.speedY;
                p.shimmer += p.shimmerSpeed;
                if (p.type === 'foil') {
                    p.rotation += p.rotationSpeed;
                }

                // 循環
                if (p.x < -20) {
                    p.x = w + 20;
                    p.y = Math.random() * h;
                }
                if (p.y > h + 20) {
                    p.y = -20;
                    p.x = Math.random() * w + w * 0.3;
                }

                drawGoldParticle(bgCtx, p);
            });

            if (currentThemeName === 'british') {
                animationId = requestAnimationFrame(animateGoldSand);
            }
        }

        // 星河粒子系統
        let starParticles = [];
        function initStarParticles() {
            starParticles = [];
            const w = window.innerWidth;
            const h = window.innerHeight;
            // 星河方向：從右上到左下（約 -30 度角）
            const angle = -30 * Math.PI / 180;

            // 小星星
            for (let i = 0; i < 150; i++) {
                starParticles.push({
                    x: Math.random() * w * 1.5,
                    y: Math.random() * h * 1.5 - h * 0.25,
                    size: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 0.15 + 0.05,
                    opacity: Math.random() * 0.6 + 0.2,
                    twinkle: Math.random() * Math.PI * 2,
                    twinkleSpeed: Math.random() * 0.02 + 0.005,
                    angle: angle
                });
            }
            // 中等星星
            for (let i = 0; i < 40; i++) {
                starParticles.push({
                    x: Math.random() * w * 1.5,
                    y: Math.random() * h * 1.5 - h * 0.25,
                    size: Math.random() * 2 + 1.5,
                    speed: Math.random() * 0.12 + 0.04,
                    opacity: Math.random() * 0.5 + 0.3,
                    twinkle: Math.random() * Math.PI * 2,
                    twinkleSpeed: Math.random() * 0.025 + 0.008,
                    angle: angle
                });
            }
            // 明亮星
            for (let i = 0; i < 20; i++) {
                starParticles.push({
                    x: Math.random() * w * 1.5,
                    y: Math.random() * h * 1.5 - h * 0.25,
                    size: Math.random() * 2 + 3,
                    speed: Math.random() * 0.1 + 0.03,
                    opacity: Math.random() * 0.3 + 0.6,
                    twinkle: Math.random() * Math.PI * 2,
                    twinkleSpeed: Math.random() * 0.015 + 0.01,
                    angle: angle,
                    isBright: true
                });
            }
        }

        function drawStar(ctx, p) {
            const twinkleOpacity = p.opacity * (0.5 + 0.5 * Math.sin(p.twinkle));

            if (p.isBright) {
                // 大亮星帶十字光芒
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${twinkleOpacity})`);
                gradient.addColorStop(0.2, `rgba(200, 220, 255, ${twinkleOpacity * 0.6})`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
                ctx.fill();

                // 十字光芒
                ctx.strokeStyle = `rgba(255, 255, 255, ${twinkleOpacity * 0.5})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(p.x - p.size * 3, p.y);
                ctx.lineTo(p.x + p.size * 3, p.y);
                ctx.moveTo(p.x, p.y - p.size * 3);
                ctx.lineTo(p.x, p.y + p.size * 3);
                ctx.stroke();
            } else {
                // 普通星星
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${twinkleOpacity})`;
                ctx.fill();
            }
        }

        function animateStarField() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

            starParticles.forEach(p => {
                // 沿星河軌跡移動
                p.x += Math.cos(p.angle) * p.speed;
                p.y += Math.sin(p.angle) * p.speed;
                p.twinkle += p.twinkleSpeed;

                // 循環 - 從右上重新出現
                if (p.x < -50 || p.y > h + 50) {
                    p.x = w + Math.random() * 100;
                    p.y = -Math.random() * 100;
                }

                drawStar(bgCtx, p);
            });

            if (currentThemeName === 'starry') {
                animationId = requestAnimationFrame(animateStarField);
            }
        }

        function resizeBgCanvas() {
            // 使用 visualViewport 可以在鍵盤彈出時獲得正確的可視區域大小
            // 但對於背景 canvas，我們希望保持完整畫面高度，不受鍵盤影響
            const w = window.innerWidth;
            const h = window.innerHeight;
            const dpr = window.devicePixelRatio;

            // 只有在尺寸真正改變時才更新 canvas，避免不必要的重繪
            const newCanvasWidth = w * dpr;
            const newCanvasHeight = h * dpr;

            if (bgCanvas.width !== newCanvasWidth || bgCanvas.height !== newCanvasHeight) {
                bgCanvas.width = newCanvasWidth;
                bgCanvas.height = newCanvasHeight;
                bgCtx.scale(dpr, dpr);
            }
        }

        function drawBgClover(ctx, x, y, size, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = color;
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.ellipse(0, -size * 0.4, size * 0.35, size * 0.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.rotate(Math.PI / 2);
            }
            ctx.restore();
        }

        function drawBgSunflower(ctx, x, y, size, petalColor, centerColor) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = petalColor;
            for (let i = 0; i < 12; i++) {
                ctx.beginPath();
                ctx.ellipse(0, -size * 0.6, size * 0.15, size * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.rotate(Math.PI / 6);
            }
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.35, 0, Math.PI * 2);
            ctx.fillStyle = centerColor;
            ctx.fill();
            ctx.restore();
        }

        // 櫻花主題：飄落愛心 + 閃爍光點系統
        let sakuraHearts = [];
        let sakuraSparkles = [];
        // 儲存初始化時的畫面尺寸，避免鍵盤彈出影響動畫邊界
        let sakuraCanvasWidth = window.innerWidth;
        let sakuraCanvasHeight = window.innerHeight;
        // 繪製愛心（優化版：純色填充 + 簡單高光，避免每幀創建漸層）
        function drawStyledHeart(ctx, x, y, size, rotation, opacity) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);

            const scale = size / 24;
            ctx.scale(scale, scale);

            // 繪製愛心形狀
            ctx.beginPath();
            ctx.moveTo(0, -6);
            ctx.bezierCurveTo(-2, -12, -12, -12, -12, -2);
            ctx.bezierCurveTo(-12, 6, 0, 14, 0, 14);
            ctx.bezierCurveTo(0, 14, 12, 6, 12, -2);
            ctx.bezierCurveTo(12, -12, 2, -12, 0, -6);
            ctx.closePath();

            // 純色填充 - 避免每幀創建漸層
            ctx.fillStyle = `rgba(255, 130, 160, ${opacity})`;
            ctx.fill();

            // 簡單高光（圓形代替橢圓，更快）
            ctx.beginPath();
            ctx.arc(-4, -5, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${opacity * 0.5})`;
            ctx.fill();

            ctx.restore();
        }

        function initSakuraParticles(distributeOnScreen = false) {
            sakuraHearts = [];
            sakuraSparkles = [];
            // 更新儲存的畫面尺寸
            sakuraCanvasWidth = window.innerWidth;
            sakuraCanvasHeight = window.innerHeight;
            const w = sakuraCanvasWidth;
            const h = sakuraCanvasHeight;

            // 創建飄落愛心 - 不同大小層次
            const heartConfigs = [
                { count: 6, minSize: 20, maxSize: 30, baseOpacity: 0.7 },   // 大
                { count: 10, minSize: 12, maxSize: 20, baseOpacity: 0.6 },  // 中
                { count: 15, minSize: 6, maxSize: 12, baseOpacity: 0.5 }    // 小
            ];

            heartConfigs.forEach(config => {
                for (let i = 0; i < config.count; i++) {
                    const startX = Math.random() * w * 1.2 - w * 0.1;
                    const startY = distributeOnScreen
                        ? Math.random() * h * 1.2 - h * 0.1
                        : -Math.random() * h * 0.5 - 50;

                    sakuraHearts.push({
                        x: startX,
                        y: startY,
                        startX: startX,
                        size: Math.random() * (config.maxSize - config.minSize) + config.minSize,
                        baseOpacity: config.baseOpacity,
                        // 風吹效果 - 單一正弦波
                        windPhase: Math.random() * Math.PI * 2,
                        windFreq: Math.random() * 0.012 + 0.006,
                        windAmp: Math.random() * 60 + 30,
                        // 下落速度
                        baseSpeed: Math.random() * 0.5 + 0.4,
                        // 旋轉
                        rotation: Math.random() * Math.PI * 2,
                        rotationSpeed: (Math.random() - 0.5) * 0.02
                    });
                }
            });

            // 創建閃爍光點（簡化：只需呼吸效果）
            for (let i = 0; i < 20; i++) {
                sakuraSparkles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: Math.random() * 2.5 + 1,
                    baseOpacity: Math.random() * 0.4 + 0.3,
                    phase: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.06 + 0.03
                });
            }
        }

        function animateSakura() {
            // 固定增量模式 - 如金沙動畫，流暢無跳幀
            const w = sakuraCanvasWidth;
            const h = sakuraCanvasHeight;
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

            // 繪製飄落愛心（簡化物理：單一正弦波風吹 + 固定速度下落）
            sakuraHearts.forEach(heart => {
                // 風吹效果 - 單一正弦波（移除 Bezier 計算）
                heart.windPhase += heart.windFreq;
                const windOffset = Math.sin(heart.windPhase) * heart.windAmp;

                // 固定速度下落（移除速度變化計算）
                heart.y += heart.baseSpeed;

                // 計算最終 X 位置
                heart.x = heart.startX + windOffset;

                // 旋轉動畫（簡化：固定速度）
                heart.rotation += heart.rotationSpeed;

                // 重置位置
                if (heart.y > h + 50) {
                    heart.y = -Math.random() * 100 - 50;
                    heart.startX = Math.random() * w * 1.2 - w * 0.1;
                    heart.x = heart.startX;
                }

                // 繪製愛心
                drawStyledHeart(bgCtx, heart.x, heart.y, heart.size, heart.rotation, heart.baseOpacity);
            });

            // 繪製閃爍光點（簡化：純色圓點 + 呼吸效果，無漸層）
            sakuraSparkles.forEach(sparkle => {
                sparkle.phase += sparkle.speed;

                // 呼吸效果
                const breathe = 0.5 + 0.5 * Math.sin(sparkle.phase);
                const opacity = sparkle.baseOpacity * breathe;

                // 繪製光點 - 純色圓點（避免創建漸層）
                bgCtx.beginPath();
                bgCtx.arc(sparkle.x, sparkle.y, sparkle.size * 2, 0, Math.PI * 2);
                bgCtx.fillStyle = `rgba(255, 200, 220, ${opacity * 0.4})`;
                bgCtx.fill();

                // 中心亮點
                bgCtx.beginPath();
                bgCtx.arc(sparkle.x, sparkle.y, sparkle.size * 0.8, 0, Math.PI * 2);
                bgCtx.fillStyle = `rgba(255, 255, 255, ${opacity * 0.8})`;
                bgCtx.fill();
            });

            if (currentThemeName === 'sakura') {
                animationId = requestAnimationFrame(animateSakura);
            }
        }

        // 舞台主題：脈動光束 + 螢光棒
        let stageTime = 0;
        let stageLightsticks = [];

        // 螢光棒顏色 - 應援常見的鮮豔顏色
        const lightstickColors = [
            { r: 255, g: 0, b: 100 },    // 洋紅粉
            { r: 0, g: 200, b: 255 },    // 天藍
            { r: 255, g: 100, b: 0 },    // 橙色
            { r: 180, g: 0, b: 255 },    // 紫色
            { r: 0, g: 255, b: 150 },    // 青綠
            { r: 255, g: 220, b: 0 },    // 金黃
            { r: 255, g: 50, b: 150 },   // 粉紅
            { r: 100, g: 100, b: 255 },  // 藍紫
        ];

        function initStageParticles() {
            stageLightsticks = [];
            const w = window.innerWidth;
            const h = window.innerHeight;

            // 創建螢光棒 - 在底部48%區域，分成8行排列，模擬景深效果
            const rowCount = 8; // 8行
            const sticksPerRow = Math.floor(w / 35); // 每行的螢光棒數量
            const areaTop = h * 0.52; // 底部48%區域的頂端
            const areaHeight = h * 0.48; // 底部區域高度（擴大範圍讓行距更均勻）

            // 計算景深效果的行位置（由近到遠，間距由大變小）
            // 使用較平緩的緩入函數，避免底部間距過大
            const rowYCache = [];
            const getRowY = (rowIndex) => {
                if (rowYCache[rowIndex] !== undefined) return rowYCache[rowIndex];
                // rowIndex 0 = 最底部（最近），rowIndex 7 = 最頂部（最遠）
                const t = rowIndex / (rowCount - 1); // 0 到 1
                // 使用 1.5 次方緩入，底部間距適中
                const eased = Math.pow(t, 1.5);
                let y = areaTop + areaHeight * 0.05 + eased * areaHeight * 0.92;
                // 確保行距最小為0（不與前一行重疊）
                if (rowIndex > 0) {
                    const prevY = getRowY(rowIndex - 1);
                    y = Math.max(y, prevY); // 確保當前行Y >= 前一行Y
                }
                rowYCache[rowIndex] = y;
                return y;
            };

            // 計算景深效果的螢光棒長度（底部近=長，頂部遠=短）
            const getStickLength = (rowIndex) => {
                // 頂部(row 0)最短15px，底部(row 7)最長45px
                const maxLength = 45;
                const minLength = 15;
                const t = rowIndex / (rowCount - 1);
                return minLength + t * (maxLength - minLength);
            };

            // 從遠到近創建（先畫遠處，後畫近處覆蓋）
            for (let row = 0; row < rowCount; row++) {
                const rowY = getRowY(row);
                const stickLength = getStickLength(row);
                // 每行稍微錯開水平位置
                const rowOffset = (row % 2) * (w / sticksPerRow / 2);
                // 景深效果：底部(近處)螢光棒較少，頂部(遠處)螢光棒較多
                // row 0 = 最遠(頂部)，row 7 = 最近(底部)
                const depthMultiplier = 1 - (row / (rowCount - 1)) * 0.5; // 頂部1.0，底部0.5
                const actualSticksInRow = Math.floor(sticksPerRow * depthMultiplier) + 3;

                for (let i = 0; i < actualSticksInRow; i++) {
                    const color = lightstickColors[Math.floor(Math.random() * lightstickColors.length)];
                    // 根據距離調整大小和亮度（頂部遠=暗，底部近=亮）
                    const depthFactor = 0.6 + (row / (rowCount - 1)) * 0.4; // 頂部0.6，底部1.0
                    stageLightsticks.push({
                        x: rowOffset + (i / actualSticksInRow) * w + (Math.random() - 0.5) * 10,
                        baseY: rowY, // 每行固定Y位置
                        length: stickLength, // 景深長度
                        width: (Math.random() * 2 + 3) * depthFactor, // 遠處較細
                        color: color,
                        phase: Math.random() * Math.PI * 2,
                        swingSpeed: Math.random() * 2.5 + 1.5, // 加快搖擺速度
                        swingAngle: Math.random() * 0.25 + 0.2, // 搖擺幅度 (弧度)
                        glowIntensity: (Math.random() * 0.3 + 0.7) * depthFactor, // 遠處較暗
                        row: row // 記錄 號用於深度效果
                    });
                }
            }
        }

        function animateStage() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

            stageTime += 0.02;

            // 繪製脈動光束
            const beams = [
                { x: 0.5, color1: [255, 0, 127], color2: [255, 0, 127], baseOpacity: 0.5, pulseOffset: 0 },
                { x: 0.25, color1: [180, 0, 255], color2: [140, 0, 200], baseOpacity: 0.4, pulseOffset: 0.7 },
                { x: 0.75, color1: [255, 20, 180], color2: [255, 50, 150], baseOpacity: 0.4, pulseOffset: 1.4 }
            ];

            beams.forEach(beam => {
                // 脈動效果
                const pulse = 0.7 + 0.3 * Math.sin(stageTime * 1.5 + beam.pulseOffset);
                const opacity = beam.baseOpacity * pulse;

                const startX = w * beam.x;
                const widthRatio = beam.x === 0.5 ? 0.35 : 0.28;
                const heightRatio = beam.x === 0.5 ? 0.8 : 0.7;

                // 繪製柔和邊緣光束（使用橢圓漸層）
                const gradient = bgCtx.createRadialGradient(
                    startX, 0, 0,
                    startX, h * heightRatio, w * widthRatio
                );
                gradient.addColorStop(0, `rgba(${beam.color1.join(',')}, ${opacity})`);
                gradient.addColorStop(0.25, `rgba(${beam.color1.join(',')}, ${opacity * 0.6})`);
                gradient.addColorStop(0.5, `rgba(${beam.color2.join(',')}, ${opacity * 0.25})`);
                gradient.addColorStop(0.75, `rgba(${beam.color2.join(',')}, ${opacity * 0.08})`);
                gradient.addColorStop(1, 'transparent');
                bgCtx.fillStyle = gradient;
                bgCtx.fillRect(0, 0, w, h);

                // 繪製頂部光源
                const glowPulse = 0.8 + 0.2 * Math.sin(stageTime * 2 + beam.pulseOffset);
                const coreGradient = bgCtx.createRadialGradient(startX, 0, 0, startX, 0, 30 * glowPulse);
                coreGradient.addColorStop(0, 'rgba(255,255,255,0.95)');
                coreGradient.addColorStop(0.4, `rgba(${beam.color1.join(',')}, 0.7)`);
                coreGradient.addColorStop(1, 'transparent');
                bgCtx.fillStyle = coreGradient;
                bgCtx.fillRect(0, 0, w, h * 0.15);
            });

            // 繪製螢光棒（應援手燈）- 在底部35%區域，分6行排列
            stageLightsticks.forEach(stick => {
                // 計算搖擺角度 - 扇形左右擺動
                const swingAngle = Math.sin(stageTime * stick.swingSpeed + stick.phase) * stick.swingAngle;

                // 棒子底部位置（使用預設的行位置）
                const baseX = stick.x;
                const baseY = stick.baseY; // 使用各行的固定Y位置

                // 計算棒子頂端位置（根據搖擺角度）
                const tipX = baseX + Math.sin(swingAngle) * stick.length;
                const tipY = baseY - Math.cos(swingAngle) * stick.length;

                const { r, g, b } = stick.color;
                const glowPulse = 0.8 + 0.2 * Math.sin(stageTime * 3 + stick.phase);
                const glow = stick.glowIntensity * glowPulse;

                // 繪製外層光暈
                bgCtx.save();
                bgCtx.lineCap = 'round';
                bgCtx.lineWidth = stick.width + 12;
                bgCtx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${glow * 0.15})`;
                bgCtx.beginPath();
                bgCtx.moveTo(baseX, baseY);
                bgCtx.lineTo(tipX, tipY);
                bgCtx.stroke();

                // 繪製中層光暈
                bgCtx.lineWidth = stick.width + 6;
                bgCtx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${glow * 0.35})`;
                bgCtx.beginPath();
                bgCtx.moveTo(baseX, baseY);
                bgCtx.lineTo(tipX, tipY);
                bgCtx.stroke();

                // 繪製螢光棒主體
                bgCtx.lineWidth = stick.width;
                const stickGradient = bgCtx.createLinearGradient(baseX, baseY, tipX, tipY);
                stickGradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${glow * 0.6})`);
                stickGradient.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, ${glow * 0.9})`);
                stickGradient.addColorStop(0.7, `rgba(${Math.min(255, r + 50)}, ${Math.min(255, g + 50)}, ${Math.min(255, b + 50)}, ${glow})`);
                stickGradient.addColorStop(1, `rgba(255, 255, 255, ${glow * 0.9})`);
                bgCtx.strokeStyle = stickGradient;
                bgCtx.beginPath();
                bgCtx.moveTo(baseX, baseY);
                bgCtx.lineTo(tipX, tipY);
                bgCtx.stroke();

                // 繪製頂端發光點
                const tipGlow = bgCtx.createRadialGradient(tipX, tipY, 0, tipX, tipY, stick.width * 3);
                tipGlow.addColorStop(0, `rgba(255, 255, 255, ${glow * 0.95})`);
                tipGlow.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, ${glow * 0.7})`);
                tipGlow.addColorStop(0.6, `rgba(${r}, ${g}, ${b}, ${glow * 0.3})`);
                tipGlow.addColorStop(1, 'transparent');
                bgCtx.fillStyle = tipGlow;
                bgCtx.beginPath();
                bgCtx.arc(tipX, tipY, stick.width * 3, 0, Math.PI * 2);
                bgCtx.fill();

                bgCtx.restore();
            });

            if (currentThemeName === 'stage') {
                animationId = requestAnimationFrame(animateStage);
            }
        }

        function renderBgDecorations(themeName) {
            // 停止之前的動畫
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            resizeBgCanvas();
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

            const w = window.innerWidth;
            const h = window.innerHeight;

            if (themeName === 'sakura') {
                // 櫻花飄落愛心 + 閃爍光點 (立即顯示在畫面上)
                initSakuraParticles(true);
                // 使用 requestAnimationFrame 啟動動畫，確保 timestamp 正確傳入
                animationId = requestAnimationFrame(animateSakura);
            } else if (themeName === 'british') {
                // 金色流沙動畫
                initGoldParticles();
                animateGoldSand();
            } else if (themeName === 'stage') {
                // 舞台脈動光束 + 煙霧
                initStageParticles();
                animateStage();
            } else if (themeName === 'starry') {
                // 星河動畫
                initStarParticles();
                animateStarField();
            } else if (themeName === 'rainbow') {
                // 彩虹流動動畫
                animateRainbow();
            } else if (themeName === 'clover') {
                // 四葉草呼吸動畫
                initCloverParticles();
                animateClovers();
            } else if (themeName === 'sunflower') {
                // 向日葵呼吸動畫
                initSunflowerParticles();
                animateSunflowers();
            }
        }

        // 初始化背景裝飾
        renderBgDecorations(currentThemeName);

        // 追蹤視窗尺寸，用於判斷是否為鍵盤彈出導致的 resize
        let lastWindowWidth = window.innerWidth;
        let lastWindowHeight = window.innerHeight;

        // 監聽視窗大小變化
        window.addEventListener('resize', () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight;

            // 檢測是否為鍵盤彈出/收起（寬度不變或變化很小，高度變化大）
            const widthChange = Math.abs(newWidth - lastWindowWidth);
            const heightChange = Math.abs(newHeight - lastWindowHeight);
            const isKeyboardResize = widthChange < 50 && heightChange > 100;

            // 更新記錄的尺寸
            lastWindowWidth = newWidth;
            lastWindowHeight = newHeight;

            // 調整 Canvas 尺寸
            resizeBgCanvas();

            // 如果是鍵盤彈出導致的 resize，不重置初始化粒子，讓動畫繼續
            if (isKeyboardResize) {
                return;
            }

            // 真正的視窗大小變化時才重新初始化
            if (currentThemeName === 'sakura') {
                initSakuraParticles(true);
            } else if (currentThemeName === 'british') {
                initGoldParticles();
            } else if (currentThemeName === 'stage') {
                initStageParticles();
            } else if (currentThemeName === 'starry') {
                initStarParticles();
            } else if (currentThemeName === 'clover') {
                initCloverParticles();
            } else if (currentThemeName === 'sunflower') {
                initSunflowerParticles();
            } else {
                renderBgDecorations(currentThemeName);
            }
        });

// 阻止右鍵選單
document.oncontextmenu = () => false;

// 阻止 F12 和常見的開發者工具快捷鍵
document.onkeydown = (e) => {
    if (e.keyCode === 123 || 
        (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67))) {
        return false;
    }
};
